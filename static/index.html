<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenBet - Football Predictions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0e1117;
            --surface: #161b22;
            --surface-raised: #1c2129;
            --border: rgba(255,255,255,0.08);
            --accent: #58a6ff;
            --green: #3fb950;
            --yellow: #d29922;
            --red: #f85149;
            --text: #e6edf3;
            --text-secondary: #8b949e;
            --text-faint: #484f58;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            line-height: 1.5;
        }

        /* --- HEADER --- */
        .header {
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
        }

        .header-inner {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-mark {
            background: var(--accent);
            color: var(--bg);
            font-weight: 700;
            font-size: 13px;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .logo-name {
            font-size: 16px;
            font-weight: 600;
        }

        .logo-sub {
            font-size: 12px;
            color: var(--text-secondary);
            margin-left: 8px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="date"] {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 7px 12px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 13px;
            outline: none;
        }

        input[type="date"]:focus { border-color: var(--accent); }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.8); cursor: pointer; }

        .btn {
            padding: 7px 14px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: all 0.15s;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }

        .btn-primary:hover { opacity: 0.9; }

        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
        }

        .btn-ghost:hover { color: var(--text); border-color: var(--text-secondary); }

        /* --- STATUS --- */
        .status-bar {
            max-width: 900px;
            margin: 20px auto 0;
            padding: 0 24px;
            display: none;
            justify-content: space-between;
            align-items: center;
        }

        .status-bar.active { display: flex; }

        .status-title {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .status-count {
            font-size: 12px;
            color: var(--accent);
            background: rgba(88,166,255,0.1);
            padding: 2px 10px;
            border-radius: 10px;
        }

        /* --- CONTENT --- */
        .content {
            max-width: 900px;
            margin: 0 auto;
            padding: 16px 24px 60px;
        }

        .message {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .message.error { color: var(--red); }

        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- PICK CARDS --- */
        .picks-list { display: flex; flex-direction: column; gap: 12px; }

        .pick-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            transition: border-color 0.15s;
        }

        .pick-card:hover { border-color: rgba(255,255,255,0.15); }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .league {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        .kickoff {
            font-size: 12px;
            color: var(--text-faint);
        }

        /* Teams row */
        .teams {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-bottom: 16px;
        }

        .team-name {
            font-size: 15px;
            font-weight: 600;
            flex: 1;
        }

        .team-name.home { text-align: right; }
        .team-name.away { text-align: left; }

        .vs {
            font-size: 11px;
            color: var(--text-faint);
            font-weight: 600;
            padding: 3px 8px;
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        /* Probability bar */
        .prob-row {
            margin-bottom: 14px;
        }

        .prob-labels {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 11px;
            font-weight: 500;
        }

        .prob-labels .lbl-home { color: var(--accent); }
        .prob-labels .lbl-draw { color: var(--yellow); }
        .prob-labels .lbl-away { color: var(--red); }

        .prob-bar {
            display: flex;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            background: rgba(255,255,255,0.04);
        }

        .prob-seg { transition: width 0.5s ease; }
        .prob-seg.home { background: var(--accent); }
        .prob-seg.draw { background: var(--yellow); }
        .prob-seg.away { background: var(--red); }

        /* Tip section */
        .tip-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .tip {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tip-badge {
            font-size: 12px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 4px;
        }

        .tip-badge.win {
            background: rgba(63,185,80,0.12);
            color: var(--green);
            border: 1px solid rgba(63,185,80,0.25);
        }

        .tip-badge.dc {
            background: rgba(88,166,255,0.12);
            color: var(--accent);
            border: 1px solid rgba(88,166,255,0.25);
        }

        .tip-pick {
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
        }

        .confidence {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .conf-bar-bg {
            width: 50px;
            height: 4px;
            background: rgba(255,255,255,0.06);
            border-radius: 2px;
            overflow: hidden;
        }

        .conf-bar-fill {
            height: 100%;
            border-radius: 2px;
            background: var(--green);
        }

        .conf-bar-fill.mid { background: var(--yellow); }

        .reasoning {
            margin-top: 12px;
            padding: 10px 12px;
            background: rgba(255,255,255,0.02);
            border-left: 2px solid var(--accent);
            border-radius: 0 4px 4px 0;
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .reasoning strong {
            color: var(--text);
            font-weight: 500;
        }

        /* --- ADMIN PANEL --- */
        .admin-toggle {
            max-width: 900px;
            margin: 12px auto 0;
            padding: 0 24px;
            text-align: right;
        }

        .admin-toggle button {
            background: none;
            border: none;
            color: var(--text-faint);
            font-size: 11px;
            cursor: pointer;
            font-family: inherit;
        }

        .admin-toggle button:hover { color: var(--text-secondary); }

        .admin-panel {
            max-width: 900px;
            margin: 8px auto 0;
            padding: 0 24px;
            display: none;
        }

        .admin-panel.open { display: block; }

        .admin-inner {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px 20px;
        }

        .admin-title {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .admin-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .admin-btn {
            padding: 8px 14px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--surface-raised);
            color: var(--text);
            transition: all 0.15s;
        }

        .admin-btn:hover { border-color: var(--accent); color: var(--accent); }
        .admin-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .admin-btn.running { border-color: var(--yellow); color: var(--yellow); }

        .admin-log {
            font-size: 11px;
            color: var(--text-secondary);
            background: rgba(0,0,0,0.3);
            border-radius: 6px;
            padding: 10px 12px;
            max-height: 120px;
            overflow-y: auto;
            display: none;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
        }

        .admin-log.active { display: block; }

        .backtest-results {
            display: none;
            margin-top: 12px;
            background: rgba(0,0,0,0.25);
            border-radius: 8px;
            padding: 14px;
        }
        .backtest-header {
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 10px;
            font-size: 13px;
        }
        .backtest-stats, .backtest-breakdown {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 8px;
            font-size: 12px;
        }
        .backtest-stat {
            color: var(--text-secondary);
        }
        .backtest-stat strong { color: var(--text-primary); }
        .backtest-days { margin-top: 10px; font-size: 12px; }
        .backtest-day-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 6px;
            margin-top: 6px;
        }
        .backtest-day {
            display: flex;
            justify-content: space-between;
            padding: 5px 8px;
            border-radius: 4px;
            font-size: 11px;
            background: rgba(255,255,255,0.05);
        }
        .backtest-day.perfect { background: rgba(34,197,94,0.2); border-left: 3px solid #22c55e; }
        .backtest-day.good { background: rgba(59,130,246,0.15); border-left: 3px solid #3b82f6; }
        .backtest-day.poor { background: rgba(239,68,68,0.15); border-left: 3px solid #ef4444; }
        .day-date { color: var(--text-secondary); }
        .day-score { font-weight: 600; }
        .day-profit { color: var(--text-secondary); }

        .admin-stats {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .admin-stat {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .admin-stat strong {
            color: var(--text);
            font-weight: 600;
        }

        @media (max-width: 600px) {
            .header-inner { flex-direction: column; align-items: flex-start; }
            .teams { flex-direction: column; gap: 4px; }
            .team-name { text-align: center !important; }
            .tip-row { flex-direction: column; align-items: flex-start; }
            .admin-actions { flex-direction: column; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <span class="logo-mark">OB</span>
                <span class="logo-name">OpenBet</span>
                <span class="logo-sub">Match Predictions</span>
            </div>
            <div class="controls">
                <input type="date" id="matchDate">
                <button class="btn btn-primary" onclick="fetchPicks()">Get Tips</button>
                <button class="btn btn-ghost" onclick="fetchPicks(true)">Regenerate</button>
            </div>
        </div>
    </header>

    <div class="status-bar" id="statusBar">
        <span class="status-title" id="statusTitle"></span>
        <span class="status-count" id="statusCount"></span>
    </div>

    <div class="admin-toggle">
        <button onclick="toggleAdmin()">Admin Panel</button>
    </div>

    <div class="admin-panel" id="adminPanel">
        <div class="admin-inner">
            <div class="admin-title">Data Pipeline</div>
            <div class="admin-stats" id="adminStats"></div>
            <div class="admin-actions">
                <button class="admin-btn" onclick="runAdmin('sync-data', this)">Sync Match Data</button>
                <button class="admin-btn" onclick="runAdmin('fetch-odds', this)">Fetch Odds</button>
                <button class="admin-btn" onclick="runAdmin('build-features', this)">Build Features</button>
                <button class="admin-btn" onclick="runAdmin('train', this)">Train Model</button>
                <button class="admin-btn" onclick="runBacktest(this)">Run Backtest</button>
                <button class="admin-btn" onclick="loadStatus()">Refresh Status</button>
            </div>
            <div class="admin-log" id="adminLog"></div>
            <div class="backtest-results" id="backtestResults"></div>
        </div>
    </div>

    <div class="content">
        <div id="picksGrid"></div>
    </div>

    <script>
        const dateInput = document.getElementById('matchDate');
        dateInput.value = new Date().toISOString().split('T')[0];

        function formatPickLabel(pick) {
            const v = pick.pick_value;
            if (v === 'HOME') return pick.home_team + ' to Win';
            if (v === 'AWAY') return pick.away_team + ' to Win';
            if (v === '1X') return pick.home_team + ' Win or Draw';
            if (v === 'X2') return pick.away_team + ' Win or Draw';
            return v;
        }

        function formatMarket(pick) {
            if (pick.pick_type === 'STRAIGHT_WIN') return '1X2';
            if (pick.pick_type === 'DOUBLE_CHANCE') return 'Double Chance';
            return pick.pick_type;
        }

        function createPickCard(pick) {
            const h = pick.probabilities?.home_win ?? 0;
            const d = pick.probabilities?.draw ?? 0;
            const a = pick.probabilities?.away_win ?? 0;
            const hP = (h * 100).toFixed(1);
            const dP = (d * 100).toFixed(1);
            const aP = (a * 100).toFixed(1);
            const conf = (pick.confidence * 100).toFixed(0);
            const isWin = pick.pick_type === 'STRAIGHT_WIN';
            const badgeClass = isWin ? 'win' : 'dc';
            const isHigh = pick.confidence >= 0.65;

            return `
                <div class="pick-card">
                    <div class="card-top">
                        <span class="league">${pick.competition || ''}</span>
                        <span class="kickoff">${pick.kick_off || ''}</span>
                    </div>
                    <div class="teams">
                        <span class="team-name home">${pick.home_team}</span>
                        <span class="vs">vs</span>
                        <span class="team-name away">${pick.away_team}</span>
                    </div>
                    <div class="prob-row">
                        <div class="prob-labels">
                            <span class="lbl-home">1 &middot; ${hP}%</span>
                            <span class="lbl-draw">X &middot; ${dP}%</span>
                            <span class="lbl-away">2 &middot; ${aP}%</span>
                        </div>
                        <div class="prob-bar">
                            <div class="prob-seg home" style="width:${hP}%"></div>
                            <div class="prob-seg draw" style="width:${dP}%"></div>
                            <div class="prob-seg away" style="width:${aP}%"></div>
                        </div>
                    </div>
                    <div class="tip-row">
                        <div class="tip">
                            <span class="tip-badge ${badgeClass}">${formatMarket(pick)}</span>
                            <span class="tip-pick">${formatPickLabel(pick)}</span>
                        </div>
                        <div class="confidence">
                            <div class="conf-bar-bg">
                                <div class="conf-bar-fill ${isHigh ? '' : 'mid'}" style="width:${conf}%"></div>
                            </div>
                            <span>${conf}%</span>
                        </div>
                    </div>
                    ${pick.reasoning ? `<div class="reasoning"><strong>Why:</strong> ${pick.reasoning}</div>` : ''}
                </div>
            `;
        }

        async function fetchPicks(force = false) {
            const date = dateInput.value;
            if (!date) return;
            const grid = document.getElementById('picksGrid');
            const statusBar = document.getElementById('statusBar');
            statusBar.classList.remove('active');

            grid.innerHTML = '<div class="message"><div class="spinner"></div>Generating predictions...</div>';

            try {
                const url = force ? `/picks/date/${date}?force=true` : `/picks/date/${date}`;
                const res = await fetch(url);
                const data = await res.json();

                if (data.error) {
                    grid.innerHTML = `<div class="message error">${data.error}</div>`;
                    return;
                }

                if (!data.picks || data.picks.length === 0) {
                    grid.innerHTML = '<div class="message">No matches scheduled for this date.</div>';
                    return;
                }

                const displayDate = new Date(date + 'T12:00:00').toLocaleDateString('en-GB', {
                    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
                });
                document.getElementById('statusTitle').textContent = displayDate;
                document.getElementById('statusCount').textContent = data.count + ' tip' + (data.count !== 1 ? 's' : '');
                statusBar.classList.add('active');

                grid.innerHTML = '<div class="picks-list">' + data.picks.map(p => createPickCard(p)).join('') + '</div>';
            } catch (e) {
                // Show a demo card so the UI can be previewed without the server
                const demo = {
                    competition: 'Premier League', kick_off: '15:00',
                    home_team: 'Arsenal', away_team: 'Chelsea',
                    probabilities: { home_win: 0.52, draw: 0.24, away_win: 0.24 },
                    pick_type: 'STRAIGHT_WIN', pick_value: 'HOME',
                    confidence: 0.52,
                    reasoning: 'Arsenal have a 52% win probability, making them clear favourites. Arsenal are in stronger recent form and have a strong home record.'
                };
                const demo2 = {
                    competition: 'La Liga', kick_off: '20:00',
                    home_team: 'Getafe', away_team: 'Barcelona',
                    probabilities: { home_win: 0.18, draw: 0.22, away_win: 0.60 },
                    pick_type: 'STRAIGHT_WIN', pick_value: 'AWAY',
                    confidence: 0.60,
                    reasoning: 'Barcelona have a 60% win probability, making them clear favourites. Barcelona are Elo-rated significantly higher and are in stronger recent form.'
                };
                grid.innerHTML = '<div class="message error" style="padding:20px 0 10px">Server not connected — showing preview</div>'
                    + '<div class="picks-list">' + [demo, demo2].map(p => createPickCard(p)).join('') + '</div>';
            }
        }

        // --- Admin Panel ---
        function toggleAdmin() {
            document.getElementById('adminPanel').classList.toggle('open');
            const panel = document.getElementById('adminPanel');
            if (panel.classList.contains('open')) loadStatus();
        }

        async function loadStatus() {
            const el = document.getElementById('adminStats');
            try {
                const res = await fetch('/admin/status');
                const d = await res.json();
                el.innerHTML = `
                    <span class="admin-stat"><strong>${d.total_matches || 0}</strong> matches</span>
                    <span class="admin-stat"><strong>${d.finished_matches || 0}</strong> finished</span>
                    <span class="admin-stat"><strong>${d.features_built || 0}</strong> features</span>
                    <span class="admin-stat"><strong>${d.with_odds || 0}</strong> with odds</span>
                    <span class="admin-stat">XGB: <strong>${d.xgb_model ? 'Yes' : 'No'}</strong></span>
                    <span class="admin-stat">Meta: <strong>${d.meta_learner ? 'Yes' : 'No'}</strong></span>
                `;
            } catch { el.innerHTML = '<span class="admin-stat">Server offline</span>'; }
        }

        async function runAdmin(action, btn) {
            const log = document.getElementById('adminLog');
            log.classList.add('active');
            btn.disabled = true;
            btn.classList.add('running');
            const label = btn.textContent;
            btn.textContent = 'Running...';
            log.textContent += `> ${action}...\n`;

            try {
                const res = await fetch(`/admin/${action}`, { method: 'POST' });
                const text = await res.text();
                let d;
                try { d = JSON.parse(text); } catch {
                    log.textContent += `Server error (${res.status}): ${text.substring(0, 500)}\n`;
                    btn.disabled = false; btn.classList.remove('running'); btn.textContent = label;
                    return;
                }
                log.textContent += `${d.message || JSON.stringify(d)}\n`;
                if (d.metrics) {
                    log.textContent += `Metrics: ${JSON.stringify(d.metrics, null, 2)}\n`;
                }
                loadStatus();
            } catch (e) {
                log.textContent += `Error: ${e.message}\n`;
            }

            btn.disabled = false;
            btn.classList.remove('running');
            btn.textContent = label;
            log.scrollTop = log.scrollHeight;
        }

        async function runBacktest(btn) {
            const log = document.getElementById('adminLog');
            const resultsDiv = document.getElementById('backtestResults');
            log.classList.add('active');
            btn.disabled = true;
            btn.classList.add('running');
            btn.textContent = 'Running...';
            log.textContent += '> backtest (last 8 weeks)...\n';

            try {
                const res = await fetch('/admin/backtest', { method: 'POST' });
                const d = await res.json();
                log.textContent += `${d.message || JSON.stringify(d)}\n`;

                if (d.results) {
                    const r = d.results;
                    let html = `<div class="backtest-header">Backtest Results (${r.start_date} to ${r.end_date})</div>`;
                    html += `<div class="backtest-stats">
                        <span class="backtest-stat"><strong>${r.total_picks}</strong> picks</span>
                        <span class="backtest-stat"><strong>${(r.accuracy * 100).toFixed(1)}%</strong> accuracy</span>
                        <span class="backtest-stat"><strong>${r.roi !== null ? r.roi.toFixed(1) + '%' : 'N/A'}</strong> ROI</span>
                        <span class="backtest-stat"><strong>${r.perfect_matchdays}/${r.total_matchdays}</strong> perfect days</span>
                        <span class="backtest-stat"><strong>${r.avg_edge !== null ? (r.avg_edge * 100).toFixed(1) + '%' : 'N/A'}</strong> avg edge</span>
                    </div>`;

                    if (r.by_bet_type) {
                        html += '<div class="backtest-breakdown"><strong>By Bet Type:</strong>';
                        for (const [type, stats] of Object.entries(r.by_bet_type)) {
                            html += ` <span class="backtest-stat">${type}: ${stats.correct}/${stats.total} (${(stats.accuracy * 100).toFixed(0)}%)</span>`;
                        }
                        html += '</div>';
                    }

                    if (r.matchday_results && r.matchday_results.length > 0) {
                        html += '<div class="backtest-days"><strong>Per Matchday:</strong><div class="backtest-day-grid">';
                        for (const day of r.matchday_results) {
                            const cls = day.all_correct ? 'perfect' : (day.accuracy >= 0.6 ? 'good' : 'poor');
                            html += `<div class="backtest-day ${cls}">
                                <span class="day-date">${day.date}</span>
                                <span class="day-score">${day.correct_picks}/${day.total_picks}</span>
                                <span class="day-profit">${day.profit >= 0 ? '+' : ''}${day.profit.toFixed(2)}</span>
                            </div>`;
                        }
                        html += '</div></div>';
                    }

                    resultsDiv.innerHTML = html;
                    resultsDiv.style.display = 'block';
                }
            } catch (e) {
                log.textContent += `Error: ${e.message}\n`;
            }

            btn.disabled = false;
            btn.classList.remove('running');
            btn.textContent = 'Run Backtest';
            log.scrollTop = log.scrollHeight;
        }

        window.addEventListener('DOMContentLoaded', () => fetchPicks());
        dateInput.addEventListener('change', () => fetchPicks());
    </script>
</body>
</html>
