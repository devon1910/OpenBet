<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenBet — AI Football Predictions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        display: ['Newsreader', 'Georgia', 'serif'],
                        mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
                    },
                    colors: {
                        paper: '#0a0a0b',
                        surface: '#111114',
                        rule: { DEFAULT: '#1f2026', strong: '#2a2c34' },
                        ink: { DEFAULT: '#e9e8e3', muted: '#8a8d96', faint: '#52535a' },
                        accent: '#d4a44a',
                        ok: '#7cc282',
                        danger: '#d97070',
                    },
                },
            },
        }
    </script>
    <style>
        body { background: #0a0a0b; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.55); cursor: pointer; opacity: 0.7; }
        input[type="date"]::-webkit-calendar-picker-indicator:hover { opacity: 1; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.35; } }
        .animate-pulse-slow { animation: pulse 1.5s infinite; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2a2c34; }
        ::-webkit-scrollbar-thumb:hover { background: #52535a; }
        .small-caps { font-variant: small-caps; letter-spacing: 0.08em; }
    </style>
</head>
<body class="text-ink font-sans min-h-screen antialiased">

    <!-- ═══════════════════ HEADER ═══════════════════ -->
    <header class="sticky top-0 z-50 backdrop-blur-xl bg-[rgba(10,10,11,0.85)] border-b border-rule">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 py-4 flex flex-col sm:flex-row sm:items-end gap-4">
            <!-- Wordmark -->
            <div class="shrink-0">
                <h1 class="font-display text-[24px] leading-none tracking-tight">OpenBet</h1>
                <span class="text-[10px] text-ink-faint uppercase tracking-[0.22em] mt-1 inline-block">Match Intelligence</span>
            </div>

            <!-- Controls -->
            <div class="flex items-center gap-5 flex-wrap sm:ml-auto text-[12px]">
                <!-- Date Nav -->
                <div class="flex items-center gap-3">
                    <button class="text-ink-muted hover:text-ink text-lg leading-none w-5 h-5 flex items-center justify-center disabled:opacity-30 disabled:cursor-not-allowed transition-colors" id="prevDay" onclick="changeDay(-1)" title="Previous day">‹</button>
                    <input type="date" id="matchDate" class="bg-transparent border-none text-ink font-mono text-[12px] outline-none min-w-0 px-0">
                    <button class="text-ink-muted hover:text-ink text-lg leading-none w-5 h-5 flex items-center justify-center transition-colors" onclick="changeDay(1)" title="Next day">›</button>
                    <button class="text-accent text-[11px] uppercase tracking-[0.18em] hover:text-ink transition-colors" onclick="goToday()">Today</button>
                </div>
                <!-- Buttons -->
                <div class="flex items-center gap-4">
                    <button class="text-accent text-[11px] uppercase tracking-[0.18em] border-b border-accent pb-0.5 hover:opacity-70 transition-opacity" onclick="fetchPicks()">Get Tips</button>
                    <button class="text-ink-muted text-[11px] uppercase tracking-[0.18em] hover:text-ink transition-colors" onclick="fetchPicks(true)">Regenerate</button>
                    <button class="text-ink-muted text-[11px] uppercase tracking-[0.18em] hover:text-ink transition-colors" onclick="togglePaperTrading()">Paper Trading</button>
                    <button class="text-ink-faint text-[11px] uppercase tracking-[0.18em] hover:text-ink-muted transition-colors" id="adminBtn" onclick="handleAdminBtn()">Admin</button>
                </div>
            </div>
        </div>
    </header>

    <!-- ═══════════════════ STATUS BAR ═══════════════════ -->
    <div class="max-w-3xl mx-auto px-4 sm:px-6 mt-10 mb-2 hidden items-baseline justify-between gap-4 border-b border-rule pb-3" id="statusBar">
        <h2 class="font-display text-[28px] sm:text-[32px] leading-tight" id="statusTitle"></h2>
        <span class="text-[10px] text-ink-faint uppercase tracking-[0.22em] shrink-0" id="statusCount"></span>
    </div>

    <!-- ═══════════════════ LOGIN MODAL ═══════════════════ -->
    <div class="fixed inset-0 bg-black/75 backdrop-blur-sm z-[100] hidden items-center justify-center" id="loginModal" onclick="handleOverlayClick(event)">
        <div class="bg-surface border border-rule p-8 w-full max-w-sm mx-4">
            <h3 class="font-display text-[22px] leading-tight mb-1">Admin Sign In</h3>
            <p class="text-[12px] text-ink-muted mb-6">Enter credentials to access the control panel.</p>
            <div class="mb-4">
                <label class="block text-[10px] text-ink-faint uppercase tracking-[0.18em] mb-2" for="loginUser">Username</label>
                <input type="text" id="loginUser" autocomplete="username" placeholder="admin"
                    class="w-full bg-transparent border-b border-rule text-ink font-mono px-0 py-2 text-[13px] outline-none focus:border-accent transition-colors">
            </div>
            <div class="mb-4">
                <label class="block text-[10px] text-ink-faint uppercase tracking-[0.18em] mb-2" for="loginPass">Password</label>
                <input type="password" id="loginPass" autocomplete="current-password" placeholder=""
                    onkeydown="if(event.key==='Enter') submitLogin()"
                    class="w-full bg-transparent border-b border-rule text-ink font-mono px-0 py-2 text-[13px] outline-none focus:border-accent transition-colors">
            </div>
            <div class="text-[11px] text-danger mt-2 hidden" id="loginError"></div>
            <div class="flex items-center gap-6 mt-7">
                <button class="text-accent text-[11px] uppercase tracking-[0.18em] border-b border-accent pb-0.5 hover:opacity-70 transition-opacity" onclick="submitLogin()" id="loginSubmitBtn">Sign In</button>
                <button class="text-ink-muted text-[11px] uppercase tracking-[0.18em] hover:text-ink transition-colors" onclick="closeLoginModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- ═══════════════════ ADMIN PANEL (untouched) ═══════════════════ -->
    <div class="max-w-5xl mx-auto px-4 sm:px-6 mt-4 hidden" id="adminPanel">
        <div class="bg-glass border border-glass-border rounded-2xl p-5 sm:p-6" style="background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.08);border-radius:1rem;">
            <div class="flex justify-between items-center mb-4">
                <div class="text-[13px] font-bold uppercase tracking-wider text-ink-muted">Data Pipeline</div>
                <button class="text-[11px] px-3 py-1 text-danger border border-danger/30 rounded-lg hover:border-danger transition" onclick="clearToken()">Logout</button>
            </div>
            <div class="flex gap-2.5 flex-wrap mb-4" id="adminStats"></div>
            <div class="grid grid-cols-2 sm:flex gap-2 flex-wrap mb-4">
                <button class="admin-btn px-4 py-2.5 rounded-lg text-[12px] font-semibold border border-rule bg-surface text-ink hover:border-accent hover:text-accent transition-all disabled:opacity-40 disabled:cursor-not-allowed" onclick="runAdmin('sync-data', this)">Sync Match Data</button>
                <button class="admin-btn px-4 py-2.5 rounded-lg text-[12px] font-semibold border border-rule bg-surface text-ink hover:border-accent hover:text-accent transition-all disabled:opacity-40 disabled:cursor-not-allowed" onclick="runAdmin('fetch-odds', this)">Fetch Odds</button>
                <button class="admin-btn px-4 py-2.5 rounded-lg text-[12px] font-semibold border border-rule bg-surface text-ink hover:border-accent hover:text-accent transition-all disabled:opacity-40 disabled:cursor-not-allowed" onclick="runAdmin('backfill-features', this)" title="Delete all features and rebuild from scratch">Backfill Features</button>
                <button class="admin-btn px-4 py-2.5 rounded-lg text-[12px] font-semibold border border-rule bg-surface text-ink hover:border-accent hover:text-accent transition-all disabled:opacity-40 disabled:cursor-not-allowed" onclick="runAdmin('train', this)">Train Model</button>
                <button class="admin-btn px-4 py-2.5 rounded-lg text-[12px] font-semibold border border-rule bg-surface text-ink hover:border-accent hover:text-accent transition-all disabled:opacity-40 disabled:cursor-not-allowed" onclick="runAdmin('resolve-outcomes', this)">Resolve Outcomes</button>
                <button class="admin-btn px-4 py-2.5 rounded-lg text-[12px] font-semibold border border-rule bg-surface text-ink hover:border-accent hover:text-accent transition-all disabled:opacity-40 disabled:cursor-not-allowed" onclick="runBacktest(this)">Run Backtest</button>
                <button class="admin-btn px-4 py-2.5 rounded-lg text-[12px] font-semibold border border-rule bg-surface text-ink hover:border-accent hover:text-accent transition-all disabled:opacity-40 disabled:cursor-not-allowed" onclick="loadStatus()">Refresh</button>
            </div>
            <div class="text-[11px] text-ink-muted bg-black/40 border border-rule rounded-lg px-3.5 py-3 max-h-40 overflow-y-auto hidden whitespace-pre-wrap font-mono leading-relaxed" id="adminLog"></div>
            <div class="hidden mt-4 bg-black/30 border border-rule rounded-2xl p-5" id="backtestResults"></div>
        </div>
    </div>

    <!-- ═══════════════════ PAPER TRADING ═══════════════════ -->
    <div class="max-w-5xl mx-auto px-4 sm:px-6 mt-10 hidden" id="paperTradingPanel">
        <div class="border-t border-b border-rule py-8">
            <div class="flex items-baseline justify-between mb-7">
                <div>
                    <h2 class="font-display text-[26px] leading-tight">Paper Trading</h2>
                    <p class="text-[10px] text-ink-faint uppercase tracking-[0.22em] mt-1">Simulated 1-unit flat stakes</p>
                </div>
            </div>

            <!-- Summary band (4-column divided strip) -->
            <div class="grid grid-cols-2 sm:grid-cols-4 divide-x divide-rule border-y border-rule mb-8" id="ptSummary">
                <div class="text-center py-6 text-ink-muted text-sm col-span-full">Loading…</div>
            </div>

            <!-- Equity curve -->
            <div class="mb-8">
                <div class="text-[10px] font-medium uppercase tracking-[0.22em] text-ink-faint mb-3">Equity Curve</div>
                <div class="h-48 relative" id="ptChart">
                    <div class="text-center py-16 text-ink-muted text-sm">Loading…</div>
                </div>
            </div>

            <!-- Breakdown -->
            <div class="mb-8">
                <div class="text-[10px] font-medium uppercase tracking-[0.22em] text-ink-faint mb-3">By Bet Type</div>
                <div class="grid grid-cols-1 sm:grid-cols-2 divide-x divide-rule border-y border-rule" id="ptBreakdown"></div>
            </div>

            <!-- Recent Results -->
            <div>
                <div class="text-[10px] font-medium uppercase tracking-[0.22em] text-ink-faint mb-3">Recent Results</div>
                <div class="max-h-80 overflow-y-auto border-t border-rule" id="ptResults">
                    <div class="text-center py-6 text-ink-muted text-sm">Loading…</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ═══════════════════ PICKS ═══════════════════ -->
    <main class="max-w-3xl mx-auto px-4 sm:px-6 py-2 pb-24" id="picksGrid"></main>

    <!-- ═══════════════════ FOOTER ═══════════════════ -->
    <footer class="border-t border-rule mt-16 py-5 px-4 sm:px-6">
        <div class="max-w-5xl mx-auto flex items-baseline gap-6 flex-wrap">
            <span class="text-[10px] text-ink-faint uppercase tracking-[0.22em] shrink-0">Engine Status</span>
            <div class="flex gap-6 flex-wrap flex-1 font-mono text-[11px]" id="pipelineItems">
                <span class="text-ink-muted">Loading…</span>
            </div>
        </div>
    </footer>

<script>
    // ═══════ CONFIG ═══════
    const API_BASE = window.location.hostname.includes('vercel.app')
        ? 'https://openbet-e3agfzhsesaqaphw.canadacentral-01.azurewebsites.net'
        : '';

    const dateInput = document.getElementById('matchDate');
    const today = new Date().toISOString().split('T')[0];
    dateInput.value = today;
    const minDate = new Date();
    minDate.setDate(minDate.getDate() - 7);
    dateInput.min = minDate.toISOString().split('T')[0];

    function changeDay(delta) {
        const d = new Date(dateInput.value + 'T12:00:00');
        d.setDate(d.getDate() + delta);
        const newDate = d.toISOString().split('T')[0];
        if (newDate < dateInput.min) return;
        dateInput.value = newDate;
        updatePrevBtn();
        fetchPicks();
    }

    function goToday() { dateInput.value = today; updatePrevBtn(); fetchPicks(); }

    function updatePrevBtn() {
        document.getElementById('prevDay').disabled = (dateInput.value <= dateInput.min);
    }
    updatePrevBtn();

    // ═══════ AUTH ═══════
    let _token = sessionStorage.getItem('admin_token');

    function isAuthed() { return !!_token; }

    function setToken(t) {
        _token = t;
        sessionStorage.setItem('admin_token', t);
        const btn = document.getElementById('adminBtn');
        btn.classList.remove('text-ink-faint');
        btn.classList.add('text-accent');
        btn.textContent = 'Admin ✓';
    }

    function clearToken() {
        _token = null;
        sessionStorage.removeItem('admin_token');
        const btn = document.getElementById('adminBtn');
        btn.classList.remove('text-accent');
        btn.classList.add('text-ink-faint');
        btn.textContent = 'Admin';
        document.getElementById('adminPanel').classList.add('hidden');
    }

    if (_token) {
        const btn = document.getElementById('adminBtn');
        btn.classList.remove('text-ink-faint');
        btn.classList.add('text-accent');
        btn.textContent = 'Admin ✓';
    }

    function authHeaders() { return _token ? { 'Authorization': `Bearer ${_token}` } : {}; }

    function handleAdminBtn() {
        if (isAuthed()) {
            const panel = document.getElementById('adminPanel');
            panel.classList.toggle('hidden');
            if (!panel.classList.contains('hidden')) loadStatus();
        } else {
            openLoginModal();
        }
    }

    // ═══════ LOGIN MODAL ═══════
    function openLoginModal() {
        document.getElementById('loginUser').value = '';
        document.getElementById('loginPass').value = '';
        document.getElementById('loginError').classList.add('hidden');
        const modal = document.getElementById('loginModal');
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        setTimeout(() => document.getElementById('loginUser').focus(), 50);
    }

    function closeLoginModal() {
        const modal = document.getElementById('loginModal');
        modal.classList.add('hidden');
        modal.classList.remove('flex');
    }

    function handleOverlayClick(e) {
        if (e.target === document.getElementById('loginModal')) closeLoginModal();
    }

    async function submitLogin() {
        const btn = document.getElementById('loginSubmitBtn');
        const errEl = document.getElementById('loginError');
        const username = document.getElementById('loginUser').value.trim();
        const password = document.getElementById('loginPass').value;

        errEl.classList.add('hidden');
        btn.disabled = true;
        btn.textContent = 'Signing in…';

        try {
            const res = await fetch(`${API_BASE}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password }),
            });
            const data = await res.json();

            if (!res.ok) {
                errEl.textContent = data.detail || 'Invalid credentials.';
                errEl.classList.remove('hidden');
                return;
            }

            setToken(data.access_token);
            closeLoginModal();
            document.getElementById('adminPanel').classList.remove('hidden');
            loadStatus();
        } catch {
            errEl.textContent = 'Server unreachable. Try again.';
            errEl.classList.remove('hidden');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Sign In';
        }
    }

    // ═══════ PICK CARDS ═══════
    function formatPickLabel(pick) {
        const v = pick.pick_value;
        if (v === 'HOME') return pick.home_team + ' Win';
        if (v === 'AWAY') return pick.away_team + ' Win';
        if (v === '1X') return pick.home_team + ' or Draw';
        if (v === 'X2') return pick.away_team + ' or Draw';
        return v;
    }

    function formatMarket(pick) {
        if (pick.pick_type === 'STRAIGHT_WIN') return '1X2';
        if (pick.pick_type === 'DOUBLE_CHANCE') return 'DC';
        return pick.pick_type;
    }

    function formatPct(v) {
        if (v == null) return '—';
        return (v * 100).toFixed(1);
    }

    function formatEdge(model, market) {
        if (model == null || market == null) return { text: '—', cls: 'text-ink-faint' };
        const delta = (model - market) * 100;
        if (Math.abs(delta) < 0.05) return { text: '0.0', cls: 'text-ink-faint' };
        const sign = delta > 0 ? '+' : '';
        const cls = delta > 0 ? 'text-ok' : 'text-danger';
        return { text: `${sign}${delta.toFixed(1)}`, cls };
    }

    function formatOdds(val) {
        if (val == null || val === 0) return '—';
        return parseFloat(val).toFixed(2);
    }

    function createPickCard(pick) {
        const h = pick.probabilities?.home_win ?? null;
        const d = pick.probabilities?.draw ?? null;
        const a = pick.probabilities?.away_win ?? null;

        const oddsHomeImp = pick.odds_home ?? pick.probabilities?.odds_home ?? null;
        const oddsDrawImp = pick.odds_draw ?? pick.probabilities?.odds_draw ?? null;
        const oddsAwayImp = pick.odds_away ?? pick.probabilities?.odds_away ?? null;
        const hasMarket = oddsHomeImp != null || oddsDrawImp != null || oddsAwayImp != null;

        const pct = Math.round((pick.confidence || 0) * 100);
        const confClass = pct >= 65 ? 'text-accent' : 'text-ink';

        const eH = formatEdge(h, oddsHomeImp);
        const eD = formatEdge(d, oddsDrawImp);
        const eA = formatEdge(a, oddsAwayImp);

        const competition = (pick.competition || '').trim();
        const kick = (pick.kick_off || '').trim();
        const compLine = [competition, kick].filter(Boolean).join(' · ');

        const market = formatMarket(pick);
        const oddsDec = pick.odds_decimal ? formatOdds(pick.odds_decimal) : null;

        const hasReasoning = pick.reasoning && pick.reasoning.trim().length > 0;

        return `
        <article class="border-b border-rule py-8 hover:bg-[rgba(255,255,255,0.012)] transition-colors">
            <!-- Header line -->
            <div class="flex items-start justify-between gap-4 mb-3">
                <div class="text-[10px] text-ink-faint uppercase tracking-[0.22em] font-medium pt-2">${compLine}</div>
                <div class="font-mono text-[30px] leading-none tabular-nums ${confClass}">${pct}</div>
            </div>

            <!-- Teams -->
            <h3 class="font-display text-[24px] sm:text-[26px] leading-tight mb-6">
                <span>${pick.home_team}</span><span class="text-ink-faint mx-2 font-sans text-[14px] italic">vs</span><span>${pick.away_team}</span>
            </h3>

            <!-- Probability table -->
            <div class="font-mono text-[12px] tabular-nums mb-6">
                <div class="grid grid-cols-[72px_1fr_1fr_1fr] gap-x-5 gap-y-2 items-center">
                    <div class="text-[10px] text-ink-faint uppercase tracking-[0.18em] font-sans">&nbsp;</div>
                    <div class="text-right text-[10px] text-ink-faint uppercase tracking-[0.18em] font-sans">Home</div>
                    <div class="text-right text-[10px] text-ink-faint uppercase tracking-[0.18em] font-sans">Draw</div>
                    <div class="text-right text-[10px] text-ink-faint uppercase tracking-[0.18em] font-sans">Away</div>

                    <div class="text-[10px] text-ink-faint uppercase tracking-[0.18em] font-sans">Model</div>
                    <div class="text-right text-ink">${formatPct(h)}</div>
                    <div class="text-right text-ink">${formatPct(d)}</div>
                    <div class="text-right text-ink">${formatPct(a)}</div>

                    <div class="text-[10px] text-ink-faint uppercase tracking-[0.18em] font-sans">Market</div>
                    <div class="text-right text-ink-muted">${formatPct(oddsHomeImp)}</div>
                    <div class="text-right text-ink-muted">${formatPct(oddsDrawImp)}</div>
                    <div class="text-right text-ink-muted">${formatPct(oddsAwayImp)}</div>

                    ${hasMarket ? `
                    <div class="text-[10px] text-ink-faint uppercase tracking-[0.18em] font-sans">Edge</div>
                    <div class="text-right ${eH.cls}">${eH.text}</div>
                    <div class="text-right ${eD.cls}">${eD.text}</div>
                    <div class="text-right ${eA.cls}">${eA.text}</div>
                    ` : ''}
                </div>
            </div>

            <!-- Pick line -->
            <div class="flex flex-wrap items-baseline gap-x-4 gap-y-1 border-t border-rule pt-4">
                <span class="text-[10px] text-ink-faint uppercase tracking-[0.22em]">Pick</span>
                <span class="font-display text-[16px] text-ink">${formatPickLabel(pick)}</span>
                <span class="text-[10px] text-accent uppercase tracking-[0.22em]">${market}</span>
                ${oddsDec ? `<span class="font-mono text-[12px] text-ink-muted ml-auto tabular-nums">@ ${oddsDec}</span>` : ''}
            </div>

            ${hasReasoning ? `
            <div class="mt-4 pl-4 border-l border-rule">
                <div class="text-[10px] text-ink-faint uppercase tracking-[0.22em] mb-1.5">Analysis</div>
                <p class="font-display italic text-[14px] text-ink-muted leading-relaxed">${pick.reasoning}</p>
            </div>` : ''}
        </article>`;
    }

    // ═══════ FETCH PICKS ═══════
    async function fetchPicks(force = false) {
        const date = dateInput.value;
        if (!date) return;
        const grid = document.getElementById('picksGrid');
        const statusBar = document.getElementById('statusBar');
        statusBar.classList.add('hidden');
        statusBar.classList.remove('flex');

        grid.innerHTML = `<div class="text-center py-24 text-ink-muted">
            <div class="w-6 h-6 border border-rule border-t-accent rounded-full mx-auto mb-5" style="animation:spin 0.8s linear infinite"></div>
            <span class="text-[10px] uppercase tracking-[0.22em] text-ink-faint">Generating predictions</span>
        </div>`;

        try {
            const url = force ? `${API_BASE}/picks/date/${date}?force=true` : `${API_BASE}/picks/date/${date}`;
            const res = await fetch(url);
            const data = await res.json();

            if (data.error) {
                grid.innerHTML = `<div class="text-center py-24 text-danger text-sm">${data.error}</div>`;
                return;
            }

            if (!data.picks || data.picks.length === 0) {
                grid.innerHTML = `<div class="text-center py-24">
                    <div class="font-display text-[26px] text-ink-muted mb-2">No fixtures</div>
                    <div class="text-[11px] text-ink-faint uppercase tracking-[0.22em]">Try a different date</div>
                </div>`;
                return;
            }

            const displayDate = new Date(date + 'T12:00:00').toLocaleDateString('en-GB', {
                weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
            });
            document.getElementById('statusTitle').textContent = displayDate;
            document.getElementById('statusCount').textContent = data.count + ' Pick' + (data.count !== 1 ? 's' : '');
            statusBar.classList.remove('hidden');
            statusBar.classList.add('flex');

            const sorted = data.picks.sort((a, b) => (b.confidence || 0) - (a.confidence || 0));
            grid.innerHTML = sorted.map(p => createPickCard(p)).join('');
        } catch (e) {
            const demo = {
                competition: 'Premier League', kick_off: '15:00',
                home_team: 'Arsenal', away_team: 'Chelsea',
                probabilities: { home_win: 0.52, draw: 0.24, away_win: 0.24 },
                odds_home: 0.44, odds_draw: 0.28, odds_away: 0.28,
                pick_type: 'STRAIGHT_WIN', pick_value: 'HOME',
                confidence: 0.52, edge: 0.08, odds_decimal: 2.27,
                reasoning: 'Arsenal hold a clear edge over the market at home, with form and Elo both favouring the hosts.'
            };
            const demo2 = {
                competition: 'La Liga', kick_off: '20:00',
                home_team: 'Getafe', away_team: 'Barcelona',
                probabilities: { home_win: 0.18, draw: 0.22, away_win: 0.60 },
                odds_home: 0.20, odds_draw: 0.25, odds_away: 0.55,
                pick_type: 'STRAIGHT_WIN', pick_value: 'AWAY',
                confidence: 0.60, edge: 0.05, odds_decimal: 1.82,
                reasoning: 'Barcelona arrive in stronger form and rated significantly higher; market is pricing the away win conservatively.'
            };
            const demo3 = {
                competition: 'Bundesliga', kick_off: '17:30',
                home_team: 'Dortmund', away_team: 'RB Leipzig',
                probabilities: { home_win: 0.42, draw: 0.28, away_win: 0.30 },
                pick_type: 'DOUBLE_CHANCE', pick_value: '1X',
                confidence: 0.70,
            };
            const displayDate = new Date(date + 'T12:00:00').toLocaleDateString('en-GB', {
                weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
            });
            document.getElementById('statusTitle').textContent = displayDate;
            document.getElementById('statusCount').textContent = '3 Picks · Preview';
            statusBar.classList.remove('hidden');
            statusBar.classList.add('flex');
            grid.innerHTML = `<div class="text-center text-danger text-[11px] uppercase tracking-[0.22em] py-4 border-b border-rule">Server unreachable — showing preview</div>` +
                [demo, demo2, demo3].map(p => createPickCard(p)).join('');
        }
    }

    // ═══════ ADMIN PANEL ═══════
    async function loadStatus() {
        const el = document.getElementById('adminStats');
        try {
            const res = await fetch(`${API_BASE}/admin/status`, { headers: authHeaders() });
            if (res.status === 401) { clearToken(); return; }
            const d = await res.json();
            el.innerHTML = `
                <span class="text-[12px] text-ink-muted bg-surface border border-rule px-3 py-1.5 rounded-full"><strong class="text-ink font-bold">${d.total_matches || 0}</strong> matches</span>
                <span class="text-[12px] text-ink-muted bg-surface border border-rule px-3 py-1.5 rounded-full"><strong class="text-ink font-bold">${d.finished_matches || 0}</strong> finished</span>
                <span class="text-[12px] text-ink-muted bg-surface border border-rule px-3 py-1.5 rounded-full"><strong class="text-ink font-bold">${d.features_built || 0}</strong> features</span>
                <span class="text-[12px] text-ink-muted bg-surface border border-rule px-3 py-1.5 rounded-full"><strong class="text-ink font-bold">${d.with_odds || 0}</strong> with odds</span>
                <span class="text-[12px] text-ink-muted bg-surface border border-rule px-3 py-1.5 rounded-full">XGB: <strong class="text-ink font-bold">${d.xgb_model ? '✅' : '❌'}</strong></span>
                <span class="text-[12px] text-ink-muted bg-surface border border-rule px-3 py-1.5 rounded-full">Meta: <strong class="text-ink font-bold">${d.meta_learner ? '✅' : '❌'}</strong></span>
            `;
        } catch { el.innerHTML = '<span class="text-[12px] text-ink-muted bg-surface border border-rule px-3 py-1.5 rounded-full">Server offline</span>'; }
    }

    async function runAdmin(action, btn) {
        const log = document.getElementById('adminLog');
        log.classList.remove('hidden');
        btn.disabled = true;
        btn.classList.add('animate-pulse-slow');
        const label = btn.textContent;
        btn.textContent = 'Running…';
        log.textContent += `▶ ${action}…\n`;

        try {
            const res = await fetch(`${API_BASE}/admin/${action}`, { method: 'POST', headers: authHeaders() });
            if (res.status === 401) {
                clearToken();
                log.textContent += 'Session expired. Please log in again.\n';
                btn.disabled = false; btn.classList.remove('animate-pulse-slow'); btn.textContent = label;
                openLoginModal();
                return;
            }
            const d = await res.json();
            if (d.status === 'accepted' || d.status === 'running') {
                log.textContent += `${d.message}\n`;
                const poll = setInterval(async () => {
                    try {
                        const sr = await fetch(`${API_BASE}/admin/job-status/${action}`, { headers: authHeaders() });
                        const s = await sr.json();
                        if (s.status === 'ok' || s.status === 'error') {
                            clearInterval(poll);
                            log.textContent += `✔ ${s.message}\n`;
                            if (s.metrics) log.textContent += `Metrics: ${JSON.stringify(s.metrics, null, 2)}\n`;
                            btn.disabled = false; btn.classList.remove('animate-pulse-slow'); btn.textContent = label;
                            loadStatus();
                        }
                    } catch { /* keep polling */ }
                }, 3000);
            } else {
                log.textContent += `${d.message || JSON.stringify(d)}\n`;
                if (d.metrics) log.textContent += `Metrics: ${JSON.stringify(d.metrics, null, 2)}\n`;
                btn.disabled = false; btn.classList.remove('animate-pulse-slow'); btn.textContent = label;
                loadStatus();
            }
        } catch (e) {
            log.textContent += `✘ Error: ${e.message}\n`;
            btn.disabled = false; btn.classList.remove('animate-pulse-slow'); btn.textContent = label;
        }

        log.scrollTop = log.scrollHeight;
    }

    async function runBacktest(btn) {
        const log = document.getElementById('adminLog');
        const resultsDiv = document.getElementById('backtestResults');
        log.classList.remove('hidden');
        btn.disabled = true;
        btn.classList.add('animate-pulse-slow');
        btn.textContent = 'Running…';
        log.textContent += '▶ backtest (last 8 weeks)…\n';

        try {
            const res = await fetch(`${API_BASE}/admin/backtest`, { method: 'POST', headers: authHeaders() });
            if (res.status === 401) { clearToken(); openLoginModal(); return; }
            const d = await res.json();

            if (d.status === 'accepted' || d.status === 'running') {
                log.textContent += `${d.message}\n`;
                const poll = setInterval(async () => {
                    try {
                        const sr = await fetch(`${API_BASE}/admin/job-status/backtest`, { headers: authHeaders() });
                        const s = await sr.json();
                        if (s.status === 'ok' || s.status === 'error') {
                            clearInterval(poll);
                            log.textContent += `✔ ${s.message}\n`;
                            if (s.results) renderBacktest(s.results, resultsDiv);
                            btn.disabled = false; btn.classList.remove('animate-pulse-slow'); btn.textContent = 'Run Backtest';
                        }
                    } catch { /* keep polling */ }
                }, 3000);
            } else {
                log.textContent += `${d.message || JSON.stringify(d)}\n`;
                if (d.results) renderBacktest(d.results, resultsDiv);
                btn.disabled = false; btn.classList.remove('animate-pulse-slow'); btn.textContent = 'Run Backtest';
            }
        } catch (e) {
            log.textContent += `✘ Error: ${e.message}\n`;
            btn.disabled = false; btn.classList.remove('animate-pulse-slow'); btn.textContent = 'Run Backtest';
        }

        log.scrollTop = log.scrollHeight;
    }

    function renderBacktest(r, resultsDiv) {
        let html = `<div class="font-bold text-accent mb-3 text-sm">Backtest Results (${r.start_date} to ${r.end_date})</div>`;
        html += `<div class="flex gap-3 flex-wrap mb-3 text-[12px]">
            <span class="text-ink-muted"><strong class="text-ink">${r.total_picks}</strong> picks</span>
            <span class="text-ink-muted"><strong class="text-ink">${r.accuracy != null ? (r.accuracy * 100).toFixed(1) + '%' : 'N/A'}</strong> accuracy</span>
            <span class="text-ink-muted"><strong class="text-ink">${r.roi !== null ? r.roi.toFixed(1) + '%' : 'N/A'}</strong> ROI</span>
            <span class="text-ink-muted"><strong class="text-ink">${r.perfect_matchdays}/${r.total_matchdays}</strong> perfect days</span>
            <span class="text-ink-muted"><strong class="text-ink">${r.avg_edge !== null ? (r.avg_edge * 100).toFixed(1) + '%' : 'N/A'}</strong> avg edge</span>
        </div>`;

        if (r.by_bet_type) {
            html += '<div class="flex gap-3 flex-wrap mb-3 text-[12px]"><strong class="text-ink">By Bet Type:</strong>';
            for (const [type, stats] of Object.entries(r.by_bet_type)) {
                html += ` <span class="text-ink-muted">${type}: ${stats.correct || 0}/${stats.total || 0} (${stats.accuracy != null ? (stats.accuracy * 100).toFixed(0) + '%' : 'N/A'})</span>`;
            }
            html += '</div>';
        }

        if (r.matchday_results && r.matchday_results.length > 0) {
            html += '<div class="mt-3 text-[12px]"><strong class="text-ink">Per Matchday:</strong><div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-1.5 mt-2">';
            for (const day of r.matchday_results) {
                const cls = day.all_correct ? 'border-ok/40' : (day.accuracy >= 0.6 ? 'border-accent/40' : 'border-danger/40');
                html += `<div class="flex justify-between px-2.5 py-1.5 text-[11px] border ${cls}">
                    <span class="text-ink-muted">${day.date}</span>
                    <span class="font-bold">${day.correct_picks}/${day.total_picks}</span>
                    <span class="text-ink-muted">${(day.profit || 0) >= 0 ? '+' : ''}${(day.profit || 0).toFixed(2)}</span>
                </div>`;
            }
            html += '</div></div>';
        }

        resultsDiv.innerHTML = html;
        resultsDiv.classList.remove('hidden');
    }

    // ═══════ PIPELINE STATUS ═══════
    async function loadPipelineStatus() {
        const el = document.getElementById('pipelineItems');
        try {
            const res = await fetch(`${API_BASE}/pipeline-status`);
            if (!res.ok) return;
            const d = await res.json();

            const fmt = (info, label, extra) => {
                const s = info?.status;
                const statusText = s === 'ok' ? 'OK' : s === 'error' ? 'ERROR' : s === 'running' ? 'RUNNING' : 'IDLE';
                const statusCls = s === 'ok' ? 'text-ok' : s === 'error' ? 'text-danger' : s === 'running' ? 'text-accent' : 'text-ink-faint';
                const lastRun = info?.last_run ? info.last_run : '—';
                const extraText = extra ? ` · ${extra}` : '';
                return `<span class="flex items-baseline gap-2">
                    <span class="text-ink-faint uppercase tracking-[0.18em] text-[10px] font-sans">${label}</span>
                    <span class="${statusCls}">${statusText}</span>
                    <span class="text-ink-muted">${lastRun}${extraText}</span>
                </span>`;
            };

            const nextRun = d.pipeline?.next_run ? `next ${d.pipeline.next_run}` : '';
            const retrainAction = d.retrain?.action === 'retrained' ? 'retrained' : d.retrain?.action === 'none' ? 'no change' : '';

            el.innerHTML =
                fmt(d.pipeline, 'Pipeline', nextRun) +
                fmt(d.outcomes, 'Outcomes', '') +
                fmt(d.retrain, 'Model', retrainAction);
        } catch {
            el.innerHTML = '<span class="text-ink-muted">Status unavailable</span>';
        }
    }

    // ═══════ PAPER TRADING ═══════
    function togglePaperTrading() {
        const panel = document.getElementById('paperTradingPanel');
        const wasHidden = panel.classList.contains('hidden');
        panel.classList.toggle('hidden');
        if (wasHidden) loadPaperTrading();
    }

    async function loadPaperTrading() {
        try {
            const res = await fetch(`${API_BASE}/performance/paper-trading`);
            const d = await res.json();
            if (d.error) {
                document.getElementById('ptSummary').innerHTML = `<div class="text-center py-6 text-ink-muted text-sm col-span-full">${d.message || 'No data yet.'}</div>`;
                return;
            }
            renderPaperTrading(d);
        } catch (e) {
            document.getElementById('ptSummary').innerHTML = `<div class="text-center py-6 text-danger text-sm col-span-full">Failed to load: ${e.message}</div>`;
        }
    }

    function renderPaperTrading(d) {
        const profit = d.total_profit || 0;
        const bankroll = d.current_bankroll || d.starting_bankroll || 100;
        const roi = d.roi;
        const accuracy = d.accuracy;
        const wins = d.wins || 0;
        const losses = d.losses || 0;
        const pending = d.pending_picks || 0;
        const streak = d.streak || { current: '—', best_win: 0, worst_loss: 0 };
        const profitColor = profit >= 0 ? 'text-ok' : 'text-danger';
        const roiColor = (roi || 0) >= 0 ? 'text-ok' : 'text-danger';
        const streakCur = streak.current || '—';
        const streakColor = streakCur.startsWith('W') ? 'text-ok' : streakCur.startsWith('L') ? 'text-danger' : 'text-ink';

        // Summary band
        document.getElementById('ptSummary').innerHTML = `
            <div class="px-5 py-5">
                <div class="text-[10px] text-ink-faint uppercase tracking-[0.22em] mb-2">Bankroll</div>
                <div class="font-mono text-[26px] tabular-nums ${profitColor} leading-none">${bankroll.toFixed(1)}</div>
                <div class="text-[10px] text-ink-faint uppercase tracking-[0.18em] mt-2">Start ${d.starting_bankroll || 100}</div>
            </div>
            <div class="px-5 py-5">
                <div class="text-[10px] text-ink-faint uppercase tracking-[0.22em] mb-2">Return</div>
                <div class="font-mono text-[26px] tabular-nums ${roiColor} leading-none">${roi != null ? roi.toFixed(1) + '%' : '—'}</div>
                <div class="text-[10px] text-ink-faint uppercase tracking-[0.18em] mt-2">P&amp;L ${profit >= 0 ? '+' : ''}${profit.toFixed(2)}u</div>
            </div>
            <div class="px-5 py-5">
                <div class="text-[10px] text-ink-faint uppercase tracking-[0.22em] mb-2">Win Rate</div>
                <div class="font-mono text-[26px] tabular-nums text-ink leading-none">${accuracy != null ? (accuracy * 100).toFixed(1) + '%' : '—'}</div>
                <div class="text-[10px] text-ink-faint uppercase tracking-[0.18em] mt-2">${wins}W · ${losses}L${pending ? ` · ${pending} pending` : ''}</div>
            </div>
            <div class="px-5 py-5">
                <div class="text-[10px] text-ink-faint uppercase tracking-[0.22em] mb-2">Streak</div>
                <div class="font-mono text-[26px] tabular-nums ${streakColor} leading-none">${streakCur}</div>
                <div class="text-[10px] text-ink-faint uppercase tracking-[0.18em] mt-2">Best W${streak.best_win || 0} · Worst L${streak.worst_loss || 0}</div>
            </div>
        `;

        // Breakdown
        let breakdownHtml = '';
        for (const [type, stats] of Object.entries(d.by_type || {})) {
            const label = type === 'STRAIGHT_WIN' ? 'Straight Win' : 'Double Chance';
            const sROI = stats.roi;
            const sROIColor = (sROI || 0) >= 0 ? 'text-ok' : 'text-danger';
            breakdownHtml += `
                <div class="px-5 py-5">
                    <div class="text-[10px] text-ink-faint uppercase tracking-[0.22em] mb-3">${label}</div>
                    <div class="flex justify-between font-mono text-[12px] tabular-nums mb-1.5">
                        <span class="text-ink-muted font-sans text-[11px] uppercase tracking-[0.15em]">Record</span>
                        <span class="text-ink">${stats.wins || 0}/${stats.total || 0} · ${((stats.accuracy || 0) * 100).toFixed(0)}%</span>
                    </div>
                    <div class="flex justify-between font-mono text-[12px] tabular-nums">
                        <span class="text-ink-muted font-sans text-[11px] uppercase tracking-[0.15em]">Return</span>
                        <span class="${sROIColor}">${sROI != null ? sROI.toFixed(1) + '%' : '—'}</span>
                    </div>
                </div>
            `;
        }
        document.getElementById('ptBreakdown').innerHTML = breakdownHtml || '<div class="px-5 py-5 text-ink-muted text-sm col-span-full text-center">No breakdown yet.</div>';

        // Equity curve
        renderEquityCurve(d.equity_curve);

        // Recent results
        if (d.recent_results && d.recent_results.length > 0) {
            document.getElementById('ptResults').innerHTML = d.recent_results.slice().reverse().map(r => {
                const isWin = r.outcome === 'WIN';
                const isVoid = r.outcome === 'VOID';
                const letter = isWin ? 'W' : isVoid ? 'V' : 'L';
                const letterCls = isWin ? 'text-ok' : isVoid ? 'text-ink-muted' : 'text-danger';
                const rProfit = r.profit || 0;
                const profitCls = rProfit >= 0 ? 'text-ok' : 'text-danger';
                const profitTxt = `${rProfit >= 0 ? '+' : ''}${rProfit.toFixed(2)}`;
                const label = r.pick_type === 'STRAIGHT_WIN' ? '1X2' : 'DC';
                return `<div class="grid grid-cols-[24px_90px_50px_1fr_70px_70px] gap-3 items-center px-1 py-2.5 border-b border-rule font-mono text-[12px] tabular-nums">
                    <span class="${letterCls} font-medium">${letter}</span>
                    <span class="text-ink-muted">${r.date || ''}</span>
                    <span class="text-accent uppercase tracking-[0.18em] text-[10px] font-sans">${label}</span>
                    <span class="text-ink">${r.pick_value || ''}</span>
                    <span class="text-ink-muted text-right">${r.odds ? '@ ' + r.odds.toFixed(2) : ''}</span>
                    <span class="${profitCls} text-right">${profitTxt}</span>
                </div>`;
            }).join('');
        } else {
            document.getElementById('ptResults').innerHTML = '<div class="text-center py-6 text-ink-muted text-sm">No settled picks yet.</div>';
        }
    }

    function renderEquityCurve(curve) {
        const container = document.getElementById('ptChart');
        if (!curve || curve.length === 0) {
            container.innerHTML = '<div class="text-center py-16 text-ink-muted text-sm">No data yet</div>';
            return;
        }

        const values = curve.map(p => p.bankroll);
        const minV = Math.min(...values) - 2;
        const maxV = Math.max(...values) + 2;
        const range = maxV - minV || 1;
        const w = 600, h = 180, pad = 30;

        const points = curve.map((p, i) => {
            const x = pad + (i / (curve.length - 1 || 1)) * (w - pad * 2);
            const y = h - pad - ((p.bankroll - minV) / range) * (h - pad * 2);
            return { x, y, ...p };
        });

        const pathD = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
        const lastVal = values[values.length - 1];
        const lineColor = lastVal >= 100 ? '#7cc282' : '#d97070';
        const baseY = h - pad - ((100 - minV) / range) * (h - pad * 2);

        const yLabels = [minV, 100, maxV].map(v => {
            const y = h - pad - ((v - minV) / range) * (h - pad * 2);
            return `<text x="${pad - 6}" y="${y + 3}" text-anchor="end" fill="#52535a" font-size="9" font-family="JetBrains Mono, monospace">${v.toFixed(0)}</text>`;
        }).join('');

        const xIndices = [0, Math.floor(curve.length / 2), curve.length - 1];
        const xLabels = [...new Set(xIndices)].map(i => {
            const p = points[i];
            const label = (curve[i].date || '').slice(5);
            return `<text x="${p.x}" y="${h - 8}" text-anchor="middle" fill="#52535a" font-size="9" font-family="JetBrains Mono, monospace">${label}</text>`;
        }).join('');

        container.innerHTML = `
            <svg viewBox="0 0 ${w} ${h}" class="w-full h-full" preserveAspectRatio="none">
                <line x1="${pad}" y1="${baseY}" x2="${w - pad}" y2="${baseY}" stroke="#1f2026" stroke-width="0.5" stroke-dasharray="3,4" />
                <path d="${pathD}" fill="none" stroke="${lineColor}" stroke-width="1" stroke-linejoin="round" />
                <circle cx="${points[0].x}" cy="${points[0].y}" r="2" fill="${lineColor}" />
                <circle cx="${points[points.length-1].x}" cy="${points[points.length-1].y}" r="3" fill="${lineColor}" />
                ${yLabels}
                ${xLabels}
            </svg>
        `;
    }

    // ═══════ INIT ═══════
    window.addEventListener('DOMContentLoaded', () => { fetchPicks(); loadPipelineStatus(); });
    dateInput.addEventListener('change', () => { updatePrevBtn(); fetchPicks(); });
    setInterval(loadPipelineStatus, 60_000);
</script>
