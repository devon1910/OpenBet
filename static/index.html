<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenBet — AI Football Predictions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050608;
            --bg-gradient: linear-gradient(135deg, #050608 0%, #0a0f18 50%, #0d1117 100%);
            --surface: rgba(255,255,255,0.03);
            --surface-hover: rgba(255,255,255,0.06);
            --surface-raised: rgba(255,255,255,0.05);
            --glass: rgba(255,255,255,0.04);
            --glass-border: rgba(255,255,255,0.08);
            --border: rgba(255,255,255,0.06);
            --border-hover: rgba(255,255,255,0.12);
            --accent: #4f8fff;
            --accent-glow: rgba(79,143,255,0.15);
            --accent-soft: rgba(79,143,255,0.08);
            --green: #22c55e;
            --green-soft: rgba(34,197,94,0.1);
            --yellow: #eab308;
            --yellow-soft: rgba(234,179,8,0.1);
            --red: #ef4444;
            --red-soft: rgba(239,68,68,0.1);
            --orange: #f97316;
            --text: #f0f2f5;
            --text-secondary: #7c8494;
            --text-faint: #3d4452;
            --radius: 14px;
            --radius-sm: 8px;
            --radius-xs: 6px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            background-image: var(--bg-gradient);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Subtle grid pattern overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(circle at 25% 25%, rgba(79,143,255,0.03) 0%, transparent 50%),
                radial-gradient(circle at 75% 75%, rgba(34,197,94,0.02) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .app { position: relative; z-index: 1; }

        /* ═══════════════════ HEADER ═══════════════════ */
        .header {
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            background: rgba(5,6,8,0.8);
            border-bottom: 1px solid var(--border);
        }

        .header-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), #7c3aed);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 14px;
            color: white;
            letter-spacing: -0.5px;
        }

        .brand-text h1 {
            font-size: 17px;
            font-weight: 700;
            letter-spacing: -0.3px;
            line-height: 1.2;
        }

        .brand-text span {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .nav-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .date-nav {
            display: flex;
            align-items: center;
            gap: 4px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 2px;
        }

        .btn-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            font-weight: 300;
            cursor: pointer;
            border-radius: var(--radius-xs);
            transition: all 0.2s;
            padding: 0;
            line-height: 1;
        }

        .btn-icon:hover { background: var(--surface-hover); color: var(--text); }
        .btn-icon:disabled { opacity: 0.25; cursor: not-allowed; }
        .btn-icon:disabled:hover { background: transparent; color: var(--text-secondary); }

        .btn-today {
            background: transparent;
            border: none;
            color: var(--accent);
            font-family: inherit;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: var(--radius-xs);
            transition: all 0.2s;
        }

        .btn-today:hover { background: var(--accent-soft); }

        input[type="date"] {
            background: transparent;
            border: none;
            color: var(--text);
            padding: 6px 8px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            outline: none;
            transition: all 0.2s;
        }

        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.7); cursor: pointer; }

        .btn {
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 2px 8px rgba(79,143,255,0.25);
        }

        .btn-primary:hover { box-shadow: 0 4px 16px rgba(79,143,255,0.35); transform: translateY(-1px); }

        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
        }

        .btn-ghost:hover { color: var(--text); border-color: var(--border-hover); background: var(--surface); }

        .btn-admin {
            background: transparent;
            color: var(--text-faint);
            border: 1px solid transparent;
            font-size: 12px;
            padding: 6px 12px;
        }

        .btn-admin:hover { color: var(--text-secondary); border-color: var(--border); }
        .btn-admin.authed { color: var(--accent); border-color: rgba(79,143,255,0.3); background: var(--accent-soft); }

        /* ═══════════════════ DATE BAR ═══════════════════ */
        .date-bar {
            max-width: 1100px;
            margin: 24px auto 0;
            padding: 0 24px;
            display: none;
            align-items: center;
            justify-content: space-between;
        }

        .date-bar.active { display: flex; }

        .date-title {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .picks-count {
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
            background: var(--accent-soft);
            border: 1px solid rgba(79,143,255,0.15);
            padding: 4px 12px;
            border-radius: 20px;
        }

        /* ═══════════════════ CONTENT ═══════════════════ */
        .content {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px 24px 80px;
        }

        .message {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .message .message-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        .message .message-hint {
            font-size: 12px;
            color: var(--text-faint);
            margin-top: 8px;
        }

        .message.error { color: var(--red); }

        /* Odds row */
        .odds-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 14px;
            padding: 8px 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-xs);
        }

        .odds-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .odds-label {
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-faint);
        }

        .odds-value {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            font-variant-numeric: tabular-nums;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ═══════════════════ PICKS GRID ═══════════════════ */
        .picks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
            gap: 16px;
        }

        .pick-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 22px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .pick-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(79,143,255,0.3), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .pick-card:hover {
            border-color: var(--border-hover);
            background: var(--surface-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .pick-card:hover::before { opacity: 1; }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }

        .league-badge {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-secondary);
            background: var(--surface-raised);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .kickoff {
            font-size: 11px;
            color: var(--text-faint);
            font-weight: 500;
        }

        /* Teams */
        .matchup {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .team {
            flex: 1;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.2px;
        }

        .team.home { text-align: right; }
        .team.away { text-align: left; }

        .vs-divider {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-faint);
            padding: 5px 10px;
            border: 1px solid var(--border);
            border-radius: var(--radius-xs);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Probability visualization */
        .prob-section { margin-bottom: 18px; }

        .prob-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .prob-label {
            font-size: 11px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .prob-label .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
        }

        .prob-label.home .dot { background: var(--accent); }
        .prob-label.draw .dot { background: var(--yellow); }
        .prob-label.away .dot { background: var(--red); }
        .prob-label.home { color: var(--accent); }
        .prob-label.draw { color: var(--yellow); }
        .prob-label.away { color: var(--red); }

        .prob-track {
            display: flex;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            background: rgba(255,255,255,0.03);
            gap: 2px;
        }

        .prob-fill {
            border-radius: 4px;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .prob-fill.home { background: linear-gradient(90deg, var(--accent), #7c9dff); }
        .prob-fill.draw { background: linear-gradient(90deg, var(--yellow), #fcd34d); }
        .prob-fill.away { background: linear-gradient(90deg, var(--red), #fca5a5); }

        /* Pick result */
        .pick-result {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .pick-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .market-tag {
            font-size: 10px;
            font-weight: 700;
            padding: 5px 10px;
            border-radius: var(--radius-xs);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .market-tag.win {
            background: var(--green-soft);
            color: var(--green);
            border: 1px solid rgba(34,197,94,0.2);
        }

        .market-tag.dc {
            background: var(--accent-soft);
            color: var(--accent);
            border: 1px solid rgba(79,143,255,0.2);
        }

        .pick-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
        }

        .confidence-meter {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .conf-ring {
            width: 32px;
            height: 32px;
            position: relative;
        }

        .conf-ring svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .conf-ring .track {
            fill: none;
            stroke: rgba(255,255,255,0.05);
            stroke-width: 3;
        }

        .conf-ring .fill {
            fill: none;
            stroke-width: 3;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .conf-ring .fill.high { stroke: var(--green); }
        .conf-ring .fill.mid { stroke: var(--yellow); }
        .conf-ring .fill.low { stroke: var(--orange); }

        .conf-value {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-secondary);
        }

        /* Reasoning */
        .reasoning {
            margin-top: 14px;
            padding: 12px 14px;
            background: rgba(79,143,255,0.03);
            border-left: 2px solid rgba(79,143,255,0.3);
            border-radius: 0 var(--radius-xs) var(--radius-xs) 0;
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.7;
        }

        .reasoning strong {
            color: var(--text);
            font-weight: 600;
        }

        /* Edge / Value badge */
        .edge-badge {
            font-size: 10px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 20px;
            margin-left: 6px;
        }

        .edge-badge.positive { background: var(--green-soft); color: var(--green); }
        .edge-badge.neutral { background: var(--yellow-soft); color: var(--yellow); }

        /* ═══════════════════ LOGIN MODAL ═══════════════════ */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open { display: flex; }

        .modal {
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 36px;
            width: 100%;
            max-width: 380px;
            margin: 16px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5);
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .modal-sub {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 28px;
        }

        .form-group { margin-bottom: 16px; }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 13px;
            outline: none;
            transition: all 0.2s;
        }

        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        .login-error {
            font-size: 12px;
            color: var(--red);
            margin-bottom: 12px;
            display: none;
            background: var(--red-soft);
            padding: 8px 12px;
            border-radius: var(--radius-xs);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 24px;
        }

        .btn-cancel {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-cancel:hover { color: var(--text); border-color: var(--border-hover); }

        /* ═══════════════════ ADMIN PANEL ═══════════════════ */
        .admin-panel {
            max-width: 1100px;
            margin: 16px auto 0;
            padding: 0 24px;
            display: none;
        }

        .admin-panel.open { display: block; }

        .admin-inner {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 20px 24px;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .admin-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-secondary);
        }

        .btn-logout {
            font-size: 11px;
            padding: 4px 12px;
            color: var(--red);
            border-color: rgba(239,68,68,0.2);
            background: var(--red-soft);
        }

        .btn-logout:hover { border-color: var(--red); }

        .admin-stats {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .stat-chip {
            font-size: 12px;
            color: var(--text-secondary);
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 20px;
        }

        .stat-chip strong {
            color: var(--text);
            font-weight: 700;
        }

        .admin-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }

        .admin-btn {
            padding: 9px 16px;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            transition: all 0.2s;
        }

        .admin-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
        .admin-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .admin-btn.running { border-color: var(--yellow); color: var(--yellow); background: var(--yellow-soft); animation: pulse 1.5s infinite; }

        .admin-log {
            font-size: 11px;
            color: var(--text-secondary);
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            max-height: 160px;
            overflow-y: auto;
            display: none;
            white-space: pre-wrap;
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
            line-height: 1.7;
        }

        .admin-log.active { display: block; }

        /* Backtest results */
        .backtest-results {
            display: none;
            margin-top: 14px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px;
        }

        .backtest-header {
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 12px;
            font-size: 14px;
        }

        .backtest-stats, .backtest-breakdown {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 10px;
            font-size: 12px;
        }

        .backtest-stat { color: var(--text-secondary); }
        .backtest-stat strong { color: var(--text); }
        .backtest-days { margin-top: 12px; font-size: 12px; }

        .backtest-day-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 6px;
            margin-top: 8px;
        }

        .backtest-day {
            display: flex;
            justify-content: space-between;
            padding: 6px 10px;
            border-radius: var(--radius-xs);
            font-size: 11px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
        }

        .backtest-day.perfect { background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.2); }
        .backtest-day.good { background: rgba(79,143,255,0.08); border-color: rgba(79,143,255,0.15); }
        .backtest-day.poor { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.15); }
        .day-date { color: var(--text-secondary); }
        .day-score { font-weight: 700; }
        .day-profit { color: var(--text-secondary); }

        /* ═══════════════════ PIPELINE FOOTER ═══════════════════ */
        .pipeline-footer {
            border-top: 1px solid var(--border);
            margin-top: 48px;
            padding: 16px 24px;
            background: rgba(5,6,8,0.6);
        }

        .pipeline-footer-inner {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
        }

        .pipeline-label {
            font-size: 10px;
            color: var(--text-faint);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .pipeline-items {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            flex: 1;
        }

        .pipeline-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .pipeline-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-faint);
            flex-shrink: 0;
        }

        .pipeline-dot.ok      { background: var(--green); box-shadow: 0 0 6px var(--green); }
        .pipeline-dot.error   { background: var(--red); box-shadow: 0 0 6px var(--red); }
        .pipeline-dot.running { background: var(--yellow); animation: pulse 1s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%      { opacity: 0.3; }
        }

        /* ═══════════════════ RESPONSIVE ═══════════════════ */
        @media (max-width: 768px) {
            .header-inner { flex-direction: column; align-items: stretch; gap: 12px; }
            .nav-controls { flex-wrap: wrap; }
            .date-nav { flex: 1; min-width: 0; }
            .date-nav input[type="date"] { flex: 1; min-width: 0; }
            .picks-grid { grid-template-columns: 1fr; }
            .matchup { flex-direction: column; gap: 6px; }
            .team { text-align: center !important; }
            .pick-result { flex-direction: column; align-items: flex-start; }
            .admin-actions { flex-direction: column; }
            .date-title { font-size: 18px; }
            .date-bar { flex-direction: column; align-items: flex-start; gap: 8px; }
        }

        @media (max-width: 520px) {
            .picks-grid { grid-template-columns: 1fr; }
            .pick-card { padding: 16px; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--text-faint); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }
    </style>
</head>
<body>
<div class="app">
    <header class="header">
        <div class="header-inner">
            <div class="brand">
                <div class="brand-icon">OB</div>
                <div class="brand-text">
                    <h1>OpenBet</h1>
                    <span>AI-Powered Match Predictions</span>
                </div>
            </div>
            <div class="nav-controls">
                <div class="date-nav">
                    <button class="btn btn-icon" id="prevDay" onclick="changeDay(-1)" title="Previous day">&#8249;</button>
                    <input type="date" id="matchDate">
                    <button class="btn btn-icon" onclick="changeDay(1)" title="Next day">&#8250;</button>
                    <button class="btn btn-today" onclick="goToday()">Today</button>
                </div>
                <button class="btn btn-primary" onclick="fetchPicks()">Get Tips</button>
                <button class="btn btn-ghost" onclick="fetchPicks(true)">Regenerate</button>
                <button class="btn btn-admin" id="adminBtn" onclick="handleAdminBtn()">Admin</button>
            </div>
        </div>
    </header>

    <div class="date-bar" id="statusBar">
        <span class="date-title" id="statusTitle"></span>
        <span class="picks-count" id="statusCount"></span>
    </div>

    <!-- Login Modal -->
    <div class="modal-overlay" id="loginModal" onclick="handleOverlayClick(event)">
        <div class="modal">
            <div class="modal-title">Admin Login</div>
            <div class="modal-sub">Enter credentials to access the control panel.</div>
            <div class="form-group">
                <label for="loginUser">Username</label>
                <input type="text" id="loginUser" autocomplete="username" placeholder="admin">
            </div>
            <div class="form-group">
                <label for="loginPass">Password</label>
                <input type="password" id="loginPass" autocomplete="current-password" placeholder="Enter password"
                    onkeydown="if(event.key==='Enter') submitLogin()">
            </div>
            <div class="login-error" id="loginError"></div>
            <div class="modal-actions">
                <button class="btn btn-primary" style="flex:1" onclick="submitLogin()" id="loginSubmitBtn">Sign In</button>
                <button class="btn btn-cancel" onclick="closeLoginModal()">Cancel</button>
            </div>
        </div>
    </div>

    <div class="admin-panel" id="adminPanel">
        <div class="admin-inner">
            <div class="admin-header">
                <div class="admin-title">Data Pipeline</div>
                <button class="btn btn-logout" onclick="clearToken()">Logout</button>
            </div>
            <div class="admin-stats" id="adminStats"></div>
            <div class="admin-actions">
                <button class="admin-btn" onclick="runAdmin('sync-data', this)">Sync Match Data</button>
                <button class="admin-btn" onclick="runAdmin('fetch-odds', this)">Fetch Odds</button>
                <button class="admin-btn" onclick="runAdmin('build-features', this)">Build Features</button>
                <button class="admin-btn" onclick="runAdmin('train', this)">Train Model</button>
                <button class="admin-btn" onclick="runAdmin('resolve-outcomes', this)">Resolve Outcomes</button>
                <button class="admin-btn" onclick="runBacktest(this)">Run Backtest</button>
                <button class="admin-btn" onclick="loadStatus()">Refresh</button>
            </div>
            <div class="admin-log" id="adminLog"></div>
            <div class="backtest-results" id="backtestResults"></div>
        </div>
    </div>

    <div class="content">
        <div id="picksGrid"></div>
    </div>

    <footer class="pipeline-footer">
        <div class="pipeline-footer-inner">
            <span class="pipeline-label">Engine Status</span>
            <div class="pipeline-items" id="pipelineItems">
                <span class="pipeline-item"><span class="pipeline-dot"></span>Loading...</span>
            </div>
        </div>
    </footer>
</div>

<script>
    // ═══════ CONFIG ═══════
    const API_BASE = window.location.hostname.includes('vercel.app')
        ? 'https://openbet-e3agfzhsesaqaphw.canadacentral-01.azurewebsites.net'
        : '';

    const dateInput = document.getElementById('matchDate');
    const today = new Date().toISOString().split('T')[0];
    dateInput.value = today;
    dateInput.min = today;

    function changeDay(delta) {
        const d = new Date(dateInput.value + 'T12:00:00');
        d.setDate(d.getDate() + delta);
        const newDate = d.toISOString().split('T')[0];
        if (newDate < today) return;
        dateInput.value = newDate;
        updatePrevBtn();
        fetchPicks();
    }

    function goToday() {
        dateInput.value = today;
        updatePrevBtn();
        fetchPicks();
    }

    function updatePrevBtn() {
        document.getElementById('prevDay').disabled = (dateInput.value <= today);
    }

    updatePrevBtn();

    // ═══════ AUTH ═══════
    let _token = sessionStorage.getItem('admin_token');

    function isAuthed() { return !!_token; }

    function setToken(t) {
        _token = t;
        sessionStorage.setItem('admin_token', t);
        document.getElementById('adminBtn').classList.add('authed');
        document.getElementById('adminBtn').textContent = 'Admin \u2713';
    }

    function clearToken() {
        _token = null;
        sessionStorage.removeItem('admin_token');
        document.getElementById('adminBtn').classList.remove('authed');
        document.getElementById('adminBtn').textContent = 'Admin';
        document.getElementById('adminPanel').classList.remove('open');
    }

    if (_token) {
        document.getElementById('adminBtn').classList.add('authed');
        document.getElementById('adminBtn').textContent = 'Admin \u2713';
    }

    function authHeaders() {
        return _token ? { 'Authorization': `Bearer ${_token}` } : {};
    }

    function handleAdminBtn() {
        if (isAuthed()) {
            const panel = document.getElementById('adminPanel');
            panel.classList.toggle('open');
            if (panel.classList.contains('open')) loadStatus();
        } else {
            openLoginModal();
        }
    }

    // ═══════ LOGIN MODAL ═══════
    function openLoginModal() {
        document.getElementById('loginUser').value = '';
        document.getElementById('loginPass').value = '';
        document.getElementById('loginError').style.display = 'none';
        document.getElementById('loginModal').classList.add('open');
        setTimeout(() => document.getElementById('loginUser').focus(), 50);
    }

    function closeLoginModal() {
        document.getElementById('loginModal').classList.remove('open');
    }

    function handleOverlayClick(e) {
        if (e.target === document.getElementById('loginModal')) closeLoginModal();
    }

    async function submitLogin() {
        const btn = document.getElementById('loginSubmitBtn');
        const errEl = document.getElementById('loginError');
        const username = document.getElementById('loginUser').value.trim();
        const password = document.getElementById('loginPass').value;

        errEl.style.display = 'none';
        btn.disabled = true;
        btn.textContent = 'Signing in...';

        try {
            const res = await fetch(`${API_BASE}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password }),
            });
            const data = await res.json();

            if (!res.ok) {
                errEl.textContent = data.detail || 'Invalid credentials.';
                errEl.style.display = 'block';
                return;
            }

            setToken(data.access_token);
            closeLoginModal();
            document.getElementById('adminPanel').classList.add('open');
            loadStatus();
        } catch {
            errEl.textContent = 'Server unreachable. Try again.';
            errEl.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Sign In';
        }
    }

    // ═══════ PICK CARDS ═══════
    function formatPickLabel(pick) {
        const v = pick.pick_value;
        if (v === 'HOME') return pick.home_team + ' to Win';
        if (v === 'AWAY') return pick.away_team + ' to Win';
        if (v === '1X') return pick.home_team + ' Win or Draw';
        if (v === 'X2') return pick.away_team + ' Win or Draw';
        return v;
    }

    function formatMarket(pick) {
        if (pick.pick_type === 'STRAIGHT_WIN') return '1X2';
        if (pick.pick_type === 'DOUBLE_CHANCE') return 'DC';
        return pick.pick_type;
    }

    function confRing(confidence) {
        const pct = confidence * 100;
        const r = 13;
        const circ = 2 * Math.PI * r;
        const offset = circ - (confidence * circ);
        const cls = pct >= 65 ? 'high' : pct >= 50 ? 'mid' : 'low';
        return `
            <div class="confidence-meter">
                <div class="conf-ring">
                    <svg viewBox="0 0 32 32">
                        <circle class="track" cx="16" cy="16" r="${r}"/>
                        <circle class="fill ${cls}" cx="16" cy="16" r="${r}"
                            stroke-dasharray="${circ}"
                            stroke-dashoffset="${offset}"/>
                    </svg>
                </div>
                <span class="conf-value">${pct.toFixed(0)}%</span>
            </div>`;
    }

    function formatOdds(val) {
        if (val == null || val === 0) return '-';
        return parseFloat(val).toFixed(2);
    }

    function createPickCard(pick) {
        const h = pick.probabilities?.home_win ?? 0;
        const d = pick.probabilities?.draw ?? 0;
        const a = pick.probabilities?.away_win ?? 0;
        const hP = (h * 100).toFixed(1);
        const dP = (d * 100).toFixed(1);
        const aP = (a * 100).toFixed(1);
        const isWin = pick.pick_type === 'STRAIGHT_WIN';
        const badgeClass = isWin ? 'win' : 'dc';

        const edgeHtml = pick.edge != null && pick.edge > 0
            ? `<span class="edge-badge positive">+${(pick.edge * 100).toFixed(1)}% edge</span>`
            : '';

        const hasOdds = pick.odds_decimal || pick.odds_home || pick.probabilities?.odds_home;
        const oddsHome = pick.odds_home ?? pick.probabilities?.odds_home;
        const oddsDraw = pick.odds_draw ?? pick.probabilities?.odds_draw;
        const oddsAway = pick.odds_away ?? pick.probabilities?.odds_away;
        const oddsHtml = hasOdds ? `
                <div class="odds-row">
                    <div class="odds-item"><span class="odds-label">Home</span><span class="odds-value">${formatOdds(oddsHome)}</span></div>
                    <div class="odds-item"><span class="odds-label">Draw</span><span class="odds-value">${formatOdds(oddsDraw)}</span></div>
                    <div class="odds-item"><span class="odds-label">Away</span><span class="odds-value">${formatOdds(oddsAway)}</span></div>
                    ${pick.odds_decimal ? `<div class="odds-item"><span class="odds-label">Pick</span><span class="odds-value" style="color:var(--green)">${formatOdds(pick.odds_decimal)}</span></div>` : ''}
                </div>` : '';

        return `
            <div class="pick-card">
                <div class="card-header">
                    <span class="league-badge">${pick.competition || ''}</span>
                    <span class="kickoff">${pick.kick_off || ''}</span>
                </div>
                <div class="matchup">
                    <span class="team home">${pick.home_team}</span>
                    <span class="vs-divider">vs</span>
                    <span class="team away">${pick.away_team}</span>
                </div>
                ${oddsHtml}
                <div class="prob-section">
                    <div class="prob-header">
                        <span class="prob-label home"><span class="dot"></span> ${hP}%</span>
                        <span class="prob-label draw"><span class="dot"></span> ${dP}%</span>
                        <span class="prob-label away"><span class="dot"></span> ${aP}%</span>
                    </div>
                    <div class="prob-track">
                        <div class="prob-fill home" style="width:${hP}%"></div>
                        <div class="prob-fill draw" style="width:${dP}%"></div>
                        <div class="prob-fill away" style="width:${aP}%"></div>
                    </div>
                </div>
                <div class="pick-result">
                    <div class="pick-info">
                        <span class="market-tag ${badgeClass}">${formatMarket(pick)}</span>
                        <span class="pick-label">${formatPickLabel(pick)}</span>
                        ${edgeHtml}
                    </div>
                    ${confRing(pick.confidence)}
                </div>
                ${pick.reasoning ? `<div class="reasoning"><strong>Analysis:</strong> ${pick.reasoning}</div>` : ''}
            </div>`;
    }

    // ═══════ FETCH PICKS ═══════
    async function fetchPicks(force = false) {
        const date = dateInput.value;
        if (!date) return;
        const grid = document.getElementById('picksGrid');
        const statusBar = document.getElementById('statusBar');
        statusBar.classList.remove('active');

        grid.innerHTML = '<div class="message"><div class="spinner"></div>Generating predictions...</div>';

        try {
            const url = force ? `${API_BASE}/picks/date/${date}?force=true` : `${API_BASE}/picks/date/${date}`;
            const res = await fetch(url);
            const data = await res.json();

            if (data.error) {
                grid.innerHTML = `<div class="message error">${data.error}</div>`;
                return;
            }

            if (!data.picks || data.picks.length === 0) {
                grid.innerHTML = `<div class="message">
                    <div class="message-icon">&#9917;</div>
                    No matches scheduled for this date.
                    <div class="message-hint">Try a different date using the arrows above</div>
                </div>`;
                return;
            }

            const displayDate = new Date(date + 'T12:00:00').toLocaleDateString('en-GB', {
                weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
            });
            document.getElementById('statusTitle').textContent = displayDate;
            document.getElementById('statusCount').textContent = data.count + ' tip' + (data.count !== 1 ? 's' : '');
            statusBar.classList.add('active');

            grid.innerHTML = '<div class="picks-grid">' + data.picks.map(p => createPickCard(p)).join('') + '</div>';
        } catch (e) {
            const demo = {
                competition: 'Premier League', kick_off: '15:00',
                home_team: 'Arsenal', away_team: 'Chelsea',
                probabilities: { home_win: 0.52, draw: 0.24, away_win: 0.24 },
                pick_type: 'STRAIGHT_WIN', pick_value: 'HOME',
                confidence: 0.52, edge: 0.08,
                reasoning: 'Arsenal have a 52% win probability, making them clear favourites. Arsenal are in stronger recent form and have a strong home record.'
            };
            const demo2 = {
                competition: 'La Liga', kick_off: '20:00',
                home_team: 'Getafe', away_team: 'Barcelona',
                probabilities: { home_win: 0.18, draw: 0.22, away_win: 0.60 },
                pick_type: 'STRAIGHT_WIN', pick_value: 'AWAY',
                confidence: 0.60, edge: 0.12,
                reasoning: 'Barcelona have a 60% win probability, making them clear favourites. Barcelona are Elo-rated significantly higher and are in stronger recent form.'
            };
            const demo3 = {
                competition: 'Bundesliga', kick_off: '17:30',
                home_team: 'Dortmund', away_team: 'RB Leipzig',
                probabilities: { home_win: 0.42, draw: 0.28, away_win: 0.30 },
                pick_type: 'DOUBLE_CHANCE', pick_value: '1X',
                confidence: 0.70,
                reasoning: 'Dortmund have a combined 70% probability of winning or drawing at home. Strong home advantage and superior Elo rating make them the safe pick.'
            };
            grid.innerHTML = '<div class="message error" style="padding:20px 0 10px">Server not connected \u2014 showing preview</div>'
                + '<div class="picks-grid">' + [demo, demo2, demo3].map(p => createPickCard(p)).join('') + '</div>';
        }
    }

    // ═══════ ADMIN PANEL ═══════
    async function loadStatus() {
        const el = document.getElementById('adminStats');
        try {
            const res = await fetch(`${API_BASE}/admin/status`, { headers: authHeaders() });
            if (res.status === 401) { clearToken(); return; }
            const d = await res.json();
            el.innerHTML = `
                <span class="stat-chip"><strong>${d.total_matches || 0}</strong> matches</span>
                <span class="stat-chip"><strong>${d.finished_matches || 0}</strong> finished</span>
                <span class="stat-chip"><strong>${d.features_built || 0}</strong> features</span>
                <span class="stat-chip"><strong>${d.with_odds || 0}</strong> with odds</span>
                <span class="stat-chip">XGB: <strong>${d.xgb_model ? '\u2705' : '\u274c'}</strong></span>
                <span class="stat-chip">Meta: <strong>${d.meta_learner ? '\u2705' : '\u274c'}</strong></span>
            `;
        } catch { el.innerHTML = '<span class="stat-chip">Server offline</span>'; }
    }

    async function runAdmin(action, btn) {
        const log = document.getElementById('adminLog');
        log.classList.add('active');
        btn.disabled = true;
        btn.classList.add('running');
        const label = btn.textContent;
        btn.textContent = 'Running...';
        log.textContent += `\u25B6 ${action}...\n`;

        try {
            const res = await fetch(`${API_BASE}/admin/${action}`, { method: 'POST', headers: authHeaders() });
            if (res.status === 401) {
                clearToken();
                log.textContent += 'Session expired. Please log in again.\n';
                btn.disabled = false; btn.classList.remove('running'); btn.textContent = label;
                openLoginModal();
                return;
            }
            const d = await res.json();
            if (d.status === 'accepted' || d.status === 'running') {
                log.textContent += `${d.message}\n`;
                const poll = setInterval(async () => {
                    try {
                        const sr = await fetch(`${API_BASE}/admin/job-status/${action}`, { headers: authHeaders() });
                        const s = await sr.json();
                        if (s.status === 'ok' || s.status === 'error') {
                            clearInterval(poll);
                            log.textContent += `\u2714 ${s.message}\n`;
                            if (s.metrics) log.textContent += `Metrics: ${JSON.stringify(s.metrics, null, 2)}\n`;
                            btn.disabled = false; btn.classList.remove('running'); btn.textContent = label;
                            loadStatus();
                        }
                    } catch { /* keep polling */ }
                }, 3000);
            } else {
                log.textContent += `${d.message || JSON.stringify(d)}\n`;
                if (d.metrics) log.textContent += `Metrics: ${JSON.stringify(d.metrics, null, 2)}\n`;
                btn.disabled = false; btn.classList.remove('running'); btn.textContent = label;
                loadStatus();
            }
        } catch (e) {
            log.textContent += `\u2718 Error: ${e.message}\n`;
            btn.disabled = false; btn.classList.remove('running'); btn.textContent = label;
        }

        log.scrollTop = log.scrollHeight;
    }

    async function runBacktest(btn) {
        const log = document.getElementById('adminLog');
        const resultsDiv = document.getElementById('backtestResults');
        log.classList.add('active');
        btn.disabled = true;
        btn.classList.add('running');
        btn.textContent = 'Running...';
        log.textContent += '\u25B6 backtest (last 8 weeks)...\n';

        try {
            const res = await fetch(`${API_BASE}/admin/backtest`, { method: 'POST', headers: authHeaders() });
            if (res.status === 401) { clearToken(); openLoginModal(); return; }
            const d = await res.json();

            if (d.status === 'accepted' || d.status === 'running') {
                log.textContent += `${d.message}\n`;
                const poll = setInterval(async () => {
                    try {
                        const sr = await fetch(`${API_BASE}/admin/job-status/backtest`, { headers: authHeaders() });
                        const s = await sr.json();
                        if (s.status === 'ok' || s.status === 'error') {
                            clearInterval(poll);
                            log.textContent += `\u2714 ${s.message}\n`;
                            if (s.results) renderBacktest(s.results, resultsDiv);
                            btn.disabled = false; btn.classList.remove('running'); btn.textContent = 'Run Backtest';
                        }
                    } catch { /* keep polling */ }
                }, 3000);
            } else {
                log.textContent += `${d.message || JSON.stringify(d)}\n`;
                if (d.results) renderBacktest(d.results, resultsDiv);
                btn.disabled = false; btn.classList.remove('running'); btn.textContent = 'Run Backtest';
            }
        } catch (e) {
            log.textContent += `\u2718 Error: ${e.message}\n`;
            btn.disabled = false; btn.classList.remove('running'); btn.textContent = 'Run Backtest';
        }

        log.scrollTop = log.scrollHeight;
    }

    function renderBacktest(r, resultsDiv) {
        let html = `<div class="backtest-header">Backtest Results (${r.start_date} to ${r.end_date})</div>`;
        html += `<div class="backtest-stats">
            <span class="backtest-stat"><strong>${r.total_picks}</strong> picks</span>
            <span class="backtest-stat"><strong>${(r.accuracy * 100).toFixed(1)}%</strong> accuracy</span>
            <span class="backtest-stat"><strong>${r.roi !== null ? r.roi.toFixed(1) + '%' : 'N/A'}</strong> ROI</span>
            <span class="backtest-stat"><strong>${r.perfect_matchdays}/${r.total_matchdays}</strong> perfect days</span>
            <span class="backtest-stat"><strong>${r.avg_edge !== null ? (r.avg_edge * 100).toFixed(1) + '%' : 'N/A'}</strong> avg edge</span>
        </div>`;

        if (r.by_bet_type) {
            html += '<div class="backtest-breakdown"><strong>By Bet Type:</strong>';
            for (const [type, stats] of Object.entries(r.by_bet_type)) {
                html += ` <span class="backtest-stat">${type}: ${stats.correct}/${stats.total} (${(stats.accuracy * 100).toFixed(0)}%)</span>`;
            }
            html += '</div>';
        }

        if (r.matchday_results && r.matchday_results.length > 0) {
            html += '<div class="backtest-days"><strong>Per Matchday:</strong><div class="backtest-day-grid">';
            for (const day of r.matchday_results) {
                const cls = day.all_correct ? 'perfect' : (day.accuracy >= 0.6 ? 'good' : 'poor');
                html += `<div class="backtest-day ${cls}">
                    <span class="day-date">${day.date}</span>
                    <span class="day-score">${day.correct_picks}/${day.total_picks}</span>
                    <span class="day-profit">${day.profit >= 0 ? '+' : ''}${day.profit.toFixed(2)}</span>
                </div>`;
            }
            html += '</div></div>';
        }

        resultsDiv.innerHTML = html;
        resultsDiv.style.display = 'block';
    }

    // ═══════ PIPELINE STATUS ═══════
    async function loadPipelineStatus() {
        const el = document.getElementById('pipelineItems');
        try {
            const res = await fetch(`${API_BASE}/pipeline-status`);
            if (!res.ok) return;
            const d = await res.json();

            const fmt = (info, label, extra) => {
                const s = info?.status;
                const dotClass = s === 'ok' ? 'ok' : s === 'error' ? 'error' : s === 'running' ? 'running' : '';
                const lastRun = info?.last_run ? `Last: ${info.last_run}` : 'Never run';
                const extraText = extra ? ` \u00B7 ${extra}` : '';
                return `<span class="pipeline-item">
                    <span class="pipeline-dot ${dotClass}"></span>
                    <span><strong style="color:var(--text)">${label}</strong> \u2014 ${lastRun}${extraText}</span>
                </span>`;
            };

            const nextRun = d.pipeline?.next_run ? `Next: ${d.pipeline.next_run}` : '';
            const retrainAction = d.retrain?.action === 'retrained' ? 'Retrained' : d.retrain?.action === 'none' ? 'No change' : '';

            el.innerHTML =
                fmt(d.pipeline, 'Data Pipeline', nextRun) +
                fmt(d.outcomes, 'Outcomes', '') +
                fmt(d.retrain,  'Model', retrainAction);
        } catch {
            el.innerHTML = '<span class="pipeline-item"><span class="pipeline-dot"></span>Status unavailable</span>';
        }
    }

    // ═══════ INIT ═══════
    window.addEventListener('DOMContentLoaded', () => { fetchPicks(); loadPipelineStatus(); });
    dateInput.addEventListener('change', () => { updatePrevBtn(); fetchPicks(); });
    setInterval(loadPipelineStatus, 60_000);
</script>
</body>
</html>
