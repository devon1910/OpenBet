<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenBet — AI Football Predictions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    colors: {
                        surface: 'rgba(255,255,255,0.03)',
                        'surface-hover': 'rgba(255,255,255,0.06)',
                        'surface-raised': 'rgba(255,255,255,0.05)',
                        glass: 'rgba(255,255,255,0.04)',
                        'glass-border': 'rgba(255,255,255,0.08)',
                        dim: 'rgba(255,255,255,0.06)',
                        'dim-hover': 'rgba(255,255,255,0.12)',
                        accent: { DEFAULT: '#4f8fff', soft: 'rgba(79,143,255,0.08)', glow: 'rgba(79,143,255,0.15)' },
                        ok: { DEFAULT: '#22c55e', soft: 'rgba(34,197,94,0.1)' },
                        warn: { DEFAULT: '#eab308', soft: 'rgba(234,179,8,0.1)' },
                        danger: { DEFAULT: '#ef4444', soft: 'rgba(239,68,68,0.1)' },
                        muted: '#7c8494',
                        faint: '#3d4452',
                    },
                },
            },
        }
    </script>
    <style>
        body {
            background: #050608;
            background-image: linear-gradient(135deg, #050608 0%, #0a0f18 50%, #0d1117 100%);
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(circle at 25% 25%, rgba(79,143,255,0.03) 0%, transparent 50%),
                radial-gradient(circle at 75% 75%, rgba(34,197,94,0.02) 0%, transparent 50%);
            pointer-events: none;
        }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.7); cursor: pointer; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
        .animate-pulse-slow { animation: pulse 1.5s infinite; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3d4452; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #7c8494; }

        /* Card shimmer on hover */
        .pick-card { position: relative; overflow: hidden; }
        .pick-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.02) 45%, rgba(255,255,255,0.04) 50%, rgba(255,255,255,0.02) 55%, transparent 60%);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }
        .pick-card:hover::after { transform: translateX(100%); }

        /* Confidence ring */
        .conf-ring {
            width: 56px; height: 56px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .conf-ring svg { position: absolute; inset: 0; transform: rotate(-90deg); }
        .conf-ring circle { fill: none; stroke-width: 3; stroke-linecap: round; }

        /* Gradient text */
        .gradient-text {
            background: linear-gradient(135deg, #4f8fff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body class="text-gray-100 font-sans min-h-screen antialiased">
<div class="relative z-[1]">

    <!-- ═══════════════════ HEADER ═══════════════════ -->
    <header class="sticky top-0 z-50 backdrop-blur-xl bg-[rgba(5,6,8,0.8)] border-b border-dim">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 py-3 flex flex-col sm:flex-row sm:items-center gap-3">
            <!-- Brand -->
            <div class="flex items-center gap-3 shrink-0">
                <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-accent to-purple-600 flex items-center justify-center font-extrabold text-sm text-white tracking-tight">OB</div>
                <div>
                    <h1 class="text-[17px] font-bold tracking-tight leading-tight">OpenBet</h1>
                    <span class="text-[11px] text-muted">AI-Powered Match Predictions</span>
                </div>
            </div>

            <!-- Controls -->
            <div class="flex items-center gap-2 flex-wrap sm:ml-auto">
                <!-- Date Nav -->
                <div class="flex items-center gap-0.5 bg-surface border border-dim rounded-lg p-0.5">
                    <button class="w-8 h-8 flex items-center justify-center text-muted hover:bg-surface-hover hover:text-white rounded-md transition text-xl font-light" id="prevDay" onclick="changeDay(-1)" title="Previous day">&#8249;</button>
                    <input type="date" id="matchDate" class="bg-transparent border-none text-white px-2 py-1.5 text-[13px] font-medium outline-none min-w-0">
                    <button class="w-8 h-8 flex items-center justify-center text-muted hover:bg-surface-hover hover:text-white rounded-md transition text-xl font-light" onclick="changeDay(1)" title="Next day">&#8250;</button>
                    <button class="text-accent text-[11px] font-semibold px-2 py-1 rounded-md hover:bg-accent-soft transition" onclick="goToday()">Today</button>
                </div>
                <button class="px-4 py-2 rounded-lg text-[13px] font-medium bg-accent text-white shadow-[0_2px_8px_rgba(79,143,255,0.25)] hover:shadow-[0_4px_16px_rgba(79,143,255,0.35)] hover:-translate-y-px transition-all" onclick="fetchPicks()">Get Tips</button>
                <button class="px-4 py-2 rounded-lg text-[13px] font-medium border border-dim text-muted hover:text-white hover:border-dim-hover hover:bg-surface transition-all" onclick="fetchPicks(true)">Regenerate</button>
                <button class="px-3 py-1.5 rounded-lg text-[12px] text-muted border border-dim hover:text-white hover:border-dim-hover hover:bg-surface transition-all" onclick="togglePaperTrading()">Paper Trading</button>
                <button class="px-3 py-1.5 rounded-lg text-[12px] text-faint border border-transparent hover:text-muted hover:border-dim transition-all" id="adminBtn" onclick="handleAdminBtn()">Admin</button>
            </div>
        </div>
    </header>

    <!-- ═══════════════════ DATE BAR ═══════════════════ -->
    <div class="max-w-5xl mx-auto px-4 sm:px-6 mt-6 hidden items-center justify-between" id="statusBar">
        <span class="text-lg sm:text-xl font-bold tracking-tight" id="statusTitle"></span>
        <span class="text-[12px] font-semibold text-accent bg-accent-soft border border-[rgba(79,143,255,0.15)] px-3 py-1 rounded-full" id="statusCount"></span>
    </div>

    <!-- ═══════════════════ LOGIN MODAL ═══════════════════ -->
    <div class="fixed inset-0 bg-black/70 backdrop-blur-md z-[100] hidden items-center justify-center" id="loginModal" onclick="handleOverlayClick(event)">
        <div class="bg-[#0d1117] border border-dim rounded-2xl p-8 w-full max-w-sm mx-4 shadow-2xl">
            <div class="text-lg font-bold mb-1">Admin Login</div>
            <div class="text-[13px] text-muted mb-7">Enter credentials to access the control panel.</div>
            <div class="mb-4">
                <label class="block text-[12px] font-semibold text-muted mb-1.5" for="loginUser">Username</label>
                <input type="text" id="loginUser" autocomplete="username" placeholder="admin"
                    class="w-full bg-surface border border-dim text-white px-3.5 py-2.5 rounded-lg text-[13px] outline-none focus:border-accent focus:ring-2 focus:ring-accent-soft transition">
            </div>
            <div class="mb-4">
                <label class="block text-[12px] font-semibold text-muted mb-1.5" for="loginPass">Password</label>
                <input type="password" id="loginPass" autocomplete="current-password" placeholder="Enter password"
                    onkeydown="if(event.key==='Enter') submitLogin()"
                    class="w-full bg-surface border border-dim text-white px-3.5 py-2.5 rounded-lg text-[13px] outline-none focus:border-accent focus:ring-2 focus:ring-accent-soft transition">
            </div>
            <div class="text-[12px] text-danger bg-danger-soft px-3 py-2 rounded-lg mb-3 hidden" id="loginError"></div>
            <div class="flex gap-2.5 mt-6">
                <button class="flex-1 px-4 py-2.5 rounded-lg text-[13px] font-medium bg-accent text-white hover:shadow-lg transition-all" onclick="submitLogin()" id="loginSubmitBtn">Sign In</button>
                <button class="px-4 py-2.5 rounded-lg text-[13px] text-muted border border-dim hover:text-white hover:border-dim-hover transition-all" onclick="closeLoginModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- ═══════════════════ ADMIN PANEL ═══════════════════ -->
    <div class="max-w-5xl mx-auto px-4 sm:px-6 mt-4 hidden" id="adminPanel">
        <div class="bg-glass border border-glass-border rounded-2xl p-5 sm:p-6">
            <div class="flex justify-between items-center mb-4">
                <div class="text-[13px] font-bold uppercase tracking-wider text-muted">Data Pipeline</div>
                <button class="text-[11px] px-3 py-1 text-danger border border-[rgba(239,68,68,0.2)] bg-danger-soft rounded-lg hover:border-danger transition" onclick="clearToken()">Logout</button>
            </div>
            <div class="flex gap-2.5 flex-wrap mb-4" id="adminStats"></div>
            <div class="grid grid-cols-2 sm:flex gap-2 flex-wrap mb-4">
                <button class="admin-btn px-4 py-2.5 rounded-lg text-[12px] font-semibold border border-dim bg-surface text-white hover:border-accent hover:text-accent hover:bg-accent-soft transition-all disabled:opacity-40 disabled:cursor-not-allowed" onclick="runAdmin('sync-data', this)">Sync Match Data</button>
                <button class="admin-btn px-4 py-2.5 rounded-lg text-[12px] font-semibold border border-dim bg-surface text-white hover:border-accent hover:text-accent hover:bg-accent-soft transition-all disabled:opacity-40 disabled:cursor-not-allowed" onclick="runAdmin('fetch-odds', this)">Fetch Odds</button>
                <button class="admin-btn px-4 py-2.5 rounded-lg text-[12px] font-semibold border border-dim bg-surface text-white hover:border-accent hover:text-accent hover:bg-accent-soft transition-all disabled:opacity-40 disabled:cursor-not-allowed" onclick="runAdmin('build-features', this)">Build Features</button>
                <button class="admin-btn px-4 py-2.5 rounded-lg text-[12px] font-semibold border border-dim bg-surface text-white hover:border-accent hover:text-accent hover:bg-accent-soft transition-all disabled:opacity-40 disabled:cursor-not-allowed" onclick="runAdmin('backfill-features', this)" title="Delete all features and rebuild from scratch">Backfill Features</button>
                <button class="admin-btn px-4 py-2.5 rounded-lg text-[12px] font-semibold border border-dim bg-surface text-white hover:border-accent hover:text-accent hover:bg-accent-soft transition-all disabled:opacity-40 disabled:cursor-not-allowed" onclick="runAdmin('train', this)">Train Model</button>
                <button class="admin-btn px-4 py-2.5 rounded-lg text-[12px] font-semibold border border-dim bg-surface text-white hover:border-accent hover:text-accent hover:bg-accent-soft transition-all disabled:opacity-40 disabled:cursor-not-allowed" onclick="runAdmin('resolve-outcomes', this)">Resolve Outcomes</button>
                <button class="admin-btn px-4 py-2.5 rounded-lg text-[12px] font-semibold border border-dim bg-surface text-white hover:border-accent hover:text-accent hover:bg-accent-soft transition-all disabled:opacity-40 disabled:cursor-not-allowed" onclick="runBacktest(this)">Run Backtest</button>
                <button class="admin-btn px-4 py-2.5 rounded-lg text-[12px] font-semibold border border-dim bg-surface text-white hover:border-accent hover:text-accent hover:bg-accent-soft transition-all disabled:opacity-40 disabled:cursor-not-allowed" onclick="loadStatus()">Refresh</button>
            </div>
            <div class="text-[11px] text-muted bg-black/40 border border-dim rounded-lg px-3.5 py-3 max-h-40 overflow-y-auto hidden whitespace-pre-wrap font-mono leading-relaxed" id="adminLog"></div>
            <div class="hidden mt-4 bg-black/30 border border-dim rounded-2xl p-5" id="backtestResults"></div>
        </div>
    </div>

    <!-- ═══════════════════ PAPER TRADING ═══════════════════ -->
    <div class="max-w-5xl mx-auto px-4 sm:px-6 mt-4 hidden" id="paperTradingPanel">
        <div class="bg-glass border border-glass-border rounded-2xl p-5 sm:p-6">
            <div class="flex justify-between items-center mb-5">
                <div class="text-[13px] font-bold uppercase tracking-wider text-muted">Paper Trading Tracker</div>
                <span class="text-[10px] text-faint">Simulated 1-unit flat stakes</span>
            </div>

            <!-- Summary Cards -->
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-5" id="ptSummary">
                <div class="text-center py-8 text-muted text-sm col-span-full">Loading...</div>
            </div>

            <!-- Equity Curve -->
            <div class="bg-black/30 border border-dim rounded-xl p-4 mb-5">
                <div class="text-[11px] font-semibold uppercase tracking-wider text-muted mb-3">Equity Curve</div>
                <div class="h-48 relative" id="ptChart">
                    <div class="text-center py-16 text-muted text-sm">Loading chart...</div>
                </div>
            </div>

            <!-- Breakdown + Streak -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-5" id="ptBreakdown"></div>

            <!-- Recent Results -->
            <div>
                <div class="text-[11px] font-semibold uppercase tracking-wider text-muted mb-3">Recent Results</div>
                <div class="space-y-1.5 max-h-80 overflow-y-auto" id="ptResults">
                    <div class="text-center py-4 text-muted text-sm">Loading...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ═══════════════════ PICKS ═══════════════════ -->
    <div class="max-w-2xl mx-auto px-4 sm:px-6 py-6 pb-24" id="picksGrid"></div>

    <!-- ═══════════════════ FOOTER ═══════════════════ -->
    <footer class="border-t border-dim mt-12 py-4 px-4 sm:px-6 bg-[rgba(5,6,8,0.6)]">
        <div class="max-w-5xl mx-auto flex items-center gap-6 flex-wrap">
            <span class="text-[10px] text-faint uppercase tracking-widest font-bold shrink-0">Engine Status</span>
            <div class="flex gap-5 flex-wrap flex-1" id="pipelineItems">
                <span class="flex items-center gap-2 text-[11px] text-muted"><span class="w-1.5 h-1.5 rounded-full bg-faint"></span>Loading...</span>
            </div>
        </div>
    </footer>
</div>

<script>
    // ═══════ CONFIG ═══════
    const API_BASE = window.location.hostname.includes('vercel.app')
        ? 'https://openbet-e3agfzhsesaqaphw.canadacentral-01.azurewebsites.net'
        : '';

    const dateInput = document.getElementById('matchDate');
    const today = new Date().toISOString().split('T')[0];
    dateInput.value = today;
    dateInput.min = today;

    function changeDay(delta) {
        const d = new Date(dateInput.value + 'T12:00:00');
        d.setDate(d.getDate() + delta);
        const newDate = d.toISOString().split('T')[0];
        if (newDate < today) return;
        dateInput.value = newDate;
        updatePrevBtn();
        fetchPicks();
    }

    function goToday() { dateInput.value = today; updatePrevBtn(); fetchPicks(); }

    function updatePrevBtn() {
        document.getElementById('prevDay').disabled = (dateInput.value <= today);
    }
    updatePrevBtn();

    // ═══════ AUTH ═══════
    let _token = sessionStorage.getItem('admin_token');

    function isAuthed() { return !!_token; }

    function setToken(t) {
        _token = t;
        sessionStorage.setItem('admin_token', t);
        const btn = document.getElementById('adminBtn');
        btn.classList.add('!text-accent', '!border-[rgba(79,143,255,0.3)]', '!bg-accent-soft');
        btn.textContent = 'Admin \u2713';
    }

    function clearToken() {
        _token = null;
        sessionStorage.removeItem('admin_token');
        const btn = document.getElementById('adminBtn');
        btn.classList.remove('!text-accent', '!border-[rgba(79,143,255,0.3)]', '!bg-accent-soft');
        btn.textContent = 'Admin';
        document.getElementById('adminPanel').classList.add('hidden');
    }

    if (_token) {
        const btn = document.getElementById('adminBtn');
        btn.classList.add('!text-accent', '!border-[rgba(79,143,255,0.3)]', '!bg-accent-soft');
        btn.textContent = 'Admin \u2713';
    }

    function authHeaders() { return _token ? { 'Authorization': `Bearer ${_token}` } : {}; }

    function handleAdminBtn() {
        if (isAuthed()) {
            const panel = document.getElementById('adminPanel');
            panel.classList.toggle('hidden');
            if (!panel.classList.contains('hidden')) loadStatus();
        } else {
            openLoginModal();
        }
    }

    // ═══════ LOGIN MODAL ═══════
    function openLoginModal() {
        document.getElementById('loginUser').value = '';
        document.getElementById('loginPass').value = '';
        document.getElementById('loginError').classList.add('hidden');
        const modal = document.getElementById('loginModal');
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        setTimeout(() => document.getElementById('loginUser').focus(), 50);
    }

    function closeLoginModal() {
        const modal = document.getElementById('loginModal');
        modal.classList.add('hidden');
        modal.classList.remove('flex');
    }

    function handleOverlayClick(e) {
        if (e.target === document.getElementById('loginModal')) closeLoginModal();
    }

    async function submitLogin() {
        const btn = document.getElementById('loginSubmitBtn');
        const errEl = document.getElementById('loginError');
        const username = document.getElementById('loginUser').value.trim();
        const password = document.getElementById('loginPass').value;

        errEl.classList.add('hidden');
        btn.disabled = true;
        btn.textContent = 'Signing in...';

        try {
            const res = await fetch(`${API_BASE}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password }),
            });
            const data = await res.json();

            if (!res.ok) {
                errEl.textContent = data.detail || 'Invalid credentials.';
                errEl.classList.remove('hidden');
                return;
            }

            setToken(data.access_token);
            closeLoginModal();
            document.getElementById('adminPanel').classList.remove('hidden');
            loadStatus();
        } catch {
            errEl.textContent = 'Server unreachable. Try again.';
            errEl.classList.remove('hidden');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Sign In';
        }
    }

    // ═══════ PICK CARDS ═══════
    function formatPickLabel(pick) {
        const v = pick.pick_value;
        if (v === 'HOME') return pick.home_team + ' Win';
        if (v === 'AWAY') return pick.away_team + ' Win';
        if (v === '1X') return pick.home_team + ' or Draw';
        if (v === 'X2') return pick.away_team + ' or Draw';
        return v;
    }

    function formatMarket(pick) {
        if (pick.pick_type === 'STRAIGHT_WIN') return '1X2';
        if (pick.pick_type === 'DOUBLE_CHANCE') return 'DC';
        return pick.pick_type;
    }

    function formatOdds(val) {
        if (val == null || val === 0) return '-';
        return parseFloat(val).toFixed(2);
    }

    function confColor(confidence) {
        const pct = confidence * 100;
        if (pct >= 65) return { text: 'text-ok', stroke: '#22c55e', bg: 'bg-ok-soft', border: 'border-[rgba(34,197,94,0.15)]', label: 'HIGH' };
        if (pct >= 50) return { text: 'text-warn', stroke: '#eab308', bg: 'bg-warn-soft', border: 'border-[rgba(234,179,8,0.15)]', label: 'MID' };
        return { text: 'text-orange-400', stroke: '#f97316', bg: 'bg-[rgba(249,115,22,0.1)]', border: 'border-[rgba(249,115,22,0.15)]', label: 'LOW' };
    }

    function confRingSvg(pct, color) {
        const r = 24, c = 2 * Math.PI * r;
        const offset = c - (pct / 100) * c;
        return `<svg viewBox="0 0 56 56"><circle cx="28" cy="28" r="${r}" stroke="rgba(255,255,255,0.06)" /><circle cx="28" cy="28" r="${r}" stroke="${color}" stroke-dasharray="${c}" stroke-dashoffset="${offset}" /></svg>`;
    }

    function createPickCard(pick) {
        const h = pick.probabilities?.home_win ?? 0;
        const d = pick.probabilities?.draw ?? 0;
        const a = pick.probabilities?.away_win ?? 0;
        const hP = (h * 100).toFixed(1);
        const dP = (d * 100).toFixed(1);
        const aP = (a * 100).toFixed(1);
        const isWin = pick.pick_type === 'STRAIGHT_WIN';
        const pct = (pick.confidence * 100).toFixed(0);
        const cc = confColor(pick.confidence);

        const edgeHtml = pick.edge != null && pick.edge > 0
            ? `<span class="text-[10px] font-semibold px-2 py-0.5 rounded-full bg-ok-soft text-ok">+${(pick.edge * 100).toFixed(1)}% edge</span>`
            : '';

        const hasOdds = pick.odds_decimal || pick.odds_home || pick.probabilities?.odds_home;
        const oddsHome = pick.odds_home ?? pick.probabilities?.odds_home;
        const oddsDraw = pick.odds_draw ?? pick.probabilities?.odds_draw;
        const oddsAway = pick.odds_away ?? pick.probabilities?.odds_away;

        const oddsHtml = hasOdds ? `
            <div class="flex justify-between px-3 py-2 bg-surface border border-dim rounded-lg text-center mb-3">
                <div class="flex flex-col items-center gap-0.5">
                    <span class="text-[9px] font-semibold uppercase tracking-wider text-faint">Home</span>
                    <span class="text-sm font-bold tabular-nums">${formatOdds(oddsHome)}</span>
                </div>
                <div class="flex flex-col items-center gap-0.5">
                    <span class="text-[9px] font-semibold uppercase tracking-wider text-faint">Draw</span>
                    <span class="text-sm font-bold tabular-nums">${formatOdds(oddsDraw)}</span>
                </div>
                <div class="flex flex-col items-center gap-0.5">
                    <span class="text-[9px] font-semibold uppercase tracking-wider text-faint">Away</span>
                    <span class="text-sm font-bold tabular-nums">${formatOdds(oddsAway)}</span>
                </div>
                ${pick.odds_decimal ? `<div class="flex flex-col items-center gap-0.5">
                    <span class="text-[9px] font-semibold uppercase tracking-wider text-faint">Pick</span>
                    <span class="text-sm font-bold tabular-nums text-ok">${formatOdds(pick.odds_decimal)}</span>
                </div>` : ''}
            </div>` : '';

        return `
        <div class="pick-card group bg-glass border border-glass-border rounded-2xl transition-all duration-300 hover:border-dim-hover hover:bg-surface-hover hover:-translate-y-0.5 hover:shadow-[0_8px_32px_rgba(0,0,0,0.3)]">
            <!-- Top section: confidence ring + match info -->
            <div class="p-4 sm:p-5">
                <div class="flex items-start gap-4">
                    <!-- Confidence Ring -->
                    <div class="shrink-0">
                        <div class="conf-ring">
                            ${confRingSvg(pct, cc.stroke)}
                            <span class="text-[15px] font-extrabold ${cc.text} tracking-tight">${pct}</span>
                        </div>
                    </div>

                    <!-- Match Info -->
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center justify-between mb-2.5">
                            <span class="text-[10px] font-semibold uppercase tracking-wider text-muted bg-surface-raised px-2.5 py-0.5 rounded-full border border-dim truncate">${pick.competition || ''}</span>
                            <span class="text-[11px] text-faint font-medium shrink-0 ml-2">${pick.kick_off || ''}</span>
                        </div>

                        <!-- Teams -->
                        <div class="mb-3">
                            <div class="text-[15px] font-semibold tracking-tight truncate">${pick.home_team}</div>
                            <div class="text-[11px] text-faint font-medium my-0.5">vs</div>

        </div>`;

        try {
            const url = force ? `${API_BASE}/picks/date/${date}?force=true` : `${API_BASE}/picks/date/${date}`;

            if (data.error) {

    async function runAdmin(action, btn) {
        const log = document.getElementById('adminLog');
        log.classList.remove('hidden');
        btn.disabled = true;
        btn.classList.add('!border-warn', '!text-warn', '!bg-warn-soft', 'animate-pulse-slow');
        const label = btn.textContent;
        btn.textContent = 'Running...';
        log.textContent += `\u25B6 ${action}...\n`;

        try {
            const res = await fetch(`${API_BASE}/admin/${action}`, { method: 'POST', headers: authHeaders() });
            if (res.status === 401) {
                clearToken();
                log.textContent += 'Session expired. Please log in again.\n';
                btn.disabled = false; btn.classList.remove('!border-warn', '!text-warn', '!bg-warn-soft', 'animate-pulse-slow'); btn.textContent = label;
                openLoginModal();
                return;
            }
            const d = await res.json();
            if (d.status === 'accepted' || d.status === 'running') {
                log.textContent += `${d.message}\n`;
                const poll = setInterval(async () => {
                    try {
                        const sr = await fetch(`${API_BASE}/admin/job-status/${action}`, { headers: authHeaders() });
                        const s = await sr.json();
                        if (s.status === 'ok' || s.status === 'error') {
                            clearInterval(poll);
                            log.textContent += `\u2714 ${s.message}\n`;
                            if (s.metrics) log.textContent += `Metrics: ${JSON.stringify(s.metrics, null, 2)}\n`;
                            btn.disabled = false; btn.classList.remove('!border-warn', '!text-warn', '!bg-warn-soft', 'animate-pulse-slow'); btn.textContent = label;
                            loadStatus();
                        }
                    } catch { /* keep polling */ }
                }, 3000);
            } else {
                log.textContent += `${d.message || JSON.stringify(d)}\n`;
                if (d.metrics) log.textContent += `Metrics: ${JSON.stringify(d.metrics, null, 2)}\n`;
                btn.disabled = false; btn.classList.remove('!border-warn', '!text-warn', '!bg-warn-soft', 'animate-pulse-slow'); btn.textContent = label;
                loadStatus();
            }
        } catch (e) {
            log.textContent += `\u2718 Error: ${e.message}\n`;
            btn.disabled = false; btn.classList.remove('!border-warn', '!text-warn', '!bg-warn-soft', 'animate-pulse-slow'); btn.textContent = label;
        }

        log.scrollTop = log.scrollHeight;
    }

    function renderBacktest(r, resultsDiv) {
        let html = `<div class="font-bold text-accent mb-3 text-sm">Backtest Results (${r.start_date} to ${r.end_date})</div>`;
        html += `<div class="flex gap-3 flex-wrap mb-3 text-[12px]">
            <span class="text-muted"><strong class="text-white">${r.total_picks}</strong> picks</span>
            <span class="text-muted"><strong class="text-white">${(r.accuracy * 100).toFixed(1)}%</strong> accuracy</span>
            <span class="text-muted"><strong class="text-white">${r.roi !== null ? r.roi.toFixed(1) + '%' : 'N/A'}</strong> ROI</span>
            <span class="text-muted"><strong class="text-white">${r.perfect_matchdays}/${r.total_matchdays}</strong> perfect days</span>
            <span class="text-muted"><strong class="text-white">${r.avg_edge !== null ? (r.avg_edge * 100).toFixed(1) + '%' : 'N/A'}</strong> avg edge</span>
        </div>`;

        if (r.by_bet_type) {
            html += '<div class="flex gap-3 flex-wrap mb-3 text-[12px]"><strong class="text-white">By Bet Type:</strong>';
            for (const [type, stats] of Object.entries(r.by_bet_type)) {
                html += ` <span class="text-muted">${type}: ${stats.correct}/${stats.total} (${(stats.accuracy * 100).toFixed(0)}%)</span>`;
            }
            html += '</div>';
        }

        if (r.matchday_results && r.matchday_results.length > 0) {
            html += '<div class="mt-3 text-[12px]"><strong class="text-white">Per Matchday:</strong><div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-1.5 mt-2">';
            for (const day of r.matchday_results) {
                const cls = day.all_correct ? 'bg-ok-soft border-[rgba(34,197,94,0.2)]' : (day.accuracy >= 0.6 ? 'bg-accent-soft border-[rgba(79,143,255,0.15)]' : 'bg-danger-soft border-[rgba(239,68,68,0.15)]');
                html += `<div class="flex justify-between px-2.5 py-1.5 rounded-md text-[11px] border ${cls}">
                    <span class="text-muted">${day.date}</span>
                    <span class="font-bold">${day.correct_picks}/${day.total_picks}</span>
                    <span class="text-muted">${day.profit >= 0 ? '+' : ''}${day.profit.toFixed(2)}</span>
                </div>`;
            }
            html += '</div></div>';
        }

        resultsDiv.innerHTML = html;
        resultsDiv.classList.remove('hidden');
    }

    function renderEquityCurve(curve) {
        const container = document.getElementById('ptChart');
        if (!curve || curve.length === 0) {
            container.innerHTML = '<div class="text-center py-16 text-muted text-sm">No data yet</div>';
            return;
        }

        const values = curve.map(p => p.bankroll);
        const minV = Math.min(...values) - 2;
        const maxV = Math.max(...values) + 2;
        const range = maxV - minV || 1;
        const w = 600, h = 180, pad = 30;

        const points = curve.map((p, i) => {
            const x = pad + (i / (curve.length - 1 || 1)) * (w - pad * 2);
            const y = h - pad - ((p.bankroll - minV) / range) * (h - pad * 2);
            return { x, y, ...p };
        });

        const pathD = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
        const lastVal = values[values.length - 1];
        const lineColor = lastVal >= 100 ? '#22c55e' : '#ef4444';
        const baseY = h - pad - ((100 - minV) / range) * (h - pad * 2);

        // Y-axis labels
        const yLabels = [minV, 100, maxV].map(v => {
            const y = h - pad - ((v - minV) / range) * (h - pad * 2);
            return `<text x="${pad - 4}" y="${y + 3}" text-anchor="end" fill="#7c8494" font-size="9">${v.toFixed(0)}</text>`;
        }).join('');

        // X-axis labels (first, middle, last)
        const xIndices = [0, Math.floor(curve.length / 2), curve.length - 1];
        const xLabels = xIndices.map(i => {
            const p = points[i];
            const label = curve[i].date.slice(5); // MM-DD
            return `<text x="${p.x}" y="${h - 5}" text-anchor="middle" fill="#7c8494" font-size="9">${label}</text>`;
        }).join('');

        container.innerHTML = `
            <svg viewBox="0 0 ${w} ${h}" class="w-full h-full" preserveAspectRatio="none">
                <!-- Baseline at 100 -->
                <line x1="${pad}" y1="${baseY}" x2="${w - pad}" y2="${baseY}" stroke="#3d4452" stroke-width="0.5" stroke-dasharray="4,4" />
                <!-- Curve -->
                <path d="${pathD}" fill="none" stroke="${lineColor}" stroke-width="2" stroke-linejoin="round" />
                <!-- Dots at start/end -->
                <circle cx="${points[0].x}" cy="${points[0].y}" r="3" fill="${lineColor}" />
                <circle cx="${points[points.length-1].x}" cy="${points[points.length-1].y}" r="4" fill="${lineColor}" stroke="white" stroke-width="1" />
                ${yLabels}
                ${xLabels}
            </svg>
        `;
    }

    // ═══════ INIT ═══════
    window.addEventListener('DOMContentLoaded', () => { fetchPicks(); loadPipelineStatus(); });
    dateInput.addEventListener('change', () => { updatePrevBtn(); fetchPicks(); });
    setInterval(loadPipelineStatus, 60_000);
</script>
</body>
</html>
