services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openbet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openbet}
      POSTGRES_DB: ${POSTGRES_DB:-openbet}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

volumes:
  pgdata:
