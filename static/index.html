<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenBet - Football Predictions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0e1117;
            --surface: #161b22;
            --surface-raised: #1c2129;
            --border: rgba(255,255,255,0.08);
            --accent: #58a6ff;
            --green: #3fb950;
            --yellow: #d29922;
            --red: #f85149;
            --text: #e6edf3;
            --text-secondary: #8b949e;
            --text-faint: #484f58;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            line-height: 1.5;
        }

        /* --- HEADER --- */
        .header {
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
        }

        .header-inner {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-mark {
            background: var(--accent);
            color: var(--bg);
            font-weight: 700;
            font-size: 13px;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .logo-name {
            font-size: 16px;
            font-weight: 600;
        }

        .logo-sub {
            font-size: 12px;
            color: var(--text-secondary);
            margin-left: 8px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="date"] {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 7px 12px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 13px;
            outline: none;
        }

        input[type="date"]:focus { border-color: var(--accent); }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.8); cursor: pointer; }

        .btn {
            padding: 7px 14px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: all 0.15s;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }

        .btn-primary:hover { opacity: 0.9; }

        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
        }

        .btn-ghost:hover { color: var(--text); border-color: var(--text-secondary); }

        /* --- STATUS --- */
        .status-bar {
            max-width: 900px;
            margin: 20px auto 0;
            padding: 0 24px;
            display: none;
            justify-content: space-between;
            align-items: center;
        }

        .status-bar.active { display: flex; }

        .status-title {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .status-count {
            font-size: 12px;
            color: var(--accent);
            background: rgba(88,166,255,0.1);
            padding: 2px 10px;
            border-radius: 10px;
        }

        /* --- CONTENT --- */
        .content {
            max-width: 900px;
            margin: 0 auto;
            padding: 16px 24px 60px;
        }

        .message {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .message.error { color: var(--red); }

        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- PICK CARDS --- */
        .picks-list { display: flex; flex-direction: column; gap: 12px; }

        .pick-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            transition: border-color 0.15s;
        }

        .pick-card:hover { border-color: rgba(255,255,255,0.15); }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .league {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        .kickoff {
            font-size: 12px;
            color: var(--text-faint);
        }

        /* Teams row */
        .teams {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-bottom: 16px;
        }

        .team-name {
            font-size: 15px;
            font-weight: 600;
            flex: 1;
        }

        .team-name.home { text-align: right; }
        .team-name.away { text-align: left; }

        .vs {
            font-size: 11px;
            color: var(--text-faint);
            font-weight: 600;
            padding: 3px 8px;
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        /* Probability bar */
        .prob-row {
            margin-bottom: 14px;
        }

        .prob-labels {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 11px;
            font-weight: 500;
        }

        .prob-labels .lbl-home { color: var(--accent); }
        .prob-labels .lbl-draw { color: var(--yellow); }
        .prob-labels .lbl-away { color: var(--red); }

        .prob-bar {
            display: flex;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            background: rgba(255,255,255,0.04);
        }

        .prob-seg { transition: width 0.5s ease; }
        .prob-seg.home { background: var(--accent); }
        .prob-seg.draw { background: var(--yellow); }
        .prob-seg.away { background: var(--red); }

        /* Tip section */
        .tip-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .tip {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tip-badge {
            font-size: 12px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 4px;
        }

        .tip-badge.win {
            background: rgba(63,185,80,0.12);
            color: var(--green);
            border: 1px solid rgba(63,185,80,0.25);
        }

        .tip-badge.dc {
            background: rgba(88,166,255,0.12);
            color: var(--accent);
            border: 1px solid rgba(88,166,255,0.25);
        }

        .tip-pick {
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
        }

        .confidence {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .conf-bar-bg {
            width: 50px;
            height: 4px;
            background: rgba(255,255,255,0.06);
            border-radius: 2px;
            overflow: hidden;
        }

        .conf-bar-fill {
            height: 100%;
            border-radius: 2px;
            background: var(--green);
        }

        .conf-bar-fill.mid { background: var(--yellow); }

        .reasoning {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        @media (max-width: 600px) {
            .header-inner { flex-direction: column; align-items: flex-start; }
            .teams { flex-direction: column; gap: 4px; }
            .team-name { text-align: center !important; }
            .tip-row { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <span class="logo-mark">OB</span>
                <span class="logo-name">OpenBet</span>
                <span class="logo-sub">Match Predictions</span>
            </div>
            <div class="controls">
                <input type="date" id="matchDate">
                <button class="btn btn-primary" onclick="fetchPicks()">Get Tips</button>
                <button class="btn btn-ghost" onclick="fetchPicks(true)">Regenerate</button>
            </div>
        </div>
    </header>

    <div class="status-bar" id="statusBar">
        <span class="status-title" id="statusTitle"></span>
        <span class="status-count" id="statusCount"></span>
    </div>

    <div class="content">
        <div id="picksGrid"></div>
    </div>

    <script>
        const dateInput = document.getElementById('matchDate');
        dateInput.value = new Date().toISOString().split('T')[0];

        function formatPickLabel(pick) {
            const v = pick.pick_value;
            if (v === 'HOME') return pick.home_team + ' to Win';
            if (v === 'AWAY') return pick.away_team + ' to Win';
            if (v === '1X') return pick.home_team + ' Win or Draw';
            if (v === 'X2') return pick.away_team + ' Win or Draw';
            return v;
        }

        function formatMarket(pick) {
            if (pick.pick_type === 'STRAIGHT_WIN') return '1X2';
            if (pick.pick_type === 'DOUBLE_CHANCE') return 'Double Chance';
            return pick.pick_type;
        }

        function createPickCard(pick) {
            const h = pick.probabilities?.home_win ?? 0;
            const d = pick.probabilities?.draw ?? 0;
            const a = pick.probabilities?.away_win ?? 0;
            const hP = (h * 100).toFixed(1);
            const dP = (d * 100).toFixed(1);
            const aP = (a * 100).toFixed(1);
            const conf = (pick.confidence * 100).toFixed(0);
            const isWin = pick.pick_type === 'STRAIGHT_WIN';
            const badgeClass = isWin ? 'win' : 'dc';
            const isHigh = pick.confidence >= 0.65;

            return `
                <div class="pick-card">
                    <div class="card-top">
                        <span class="league">${pick.competition || ''}</span>
                        <span class="kickoff">${pick.kick_off || ''}</span>
                    </div>
                    <div class="teams">
                        <span class="team-name home">${pick.home_team}</span>
                        <span class="vs">vs</span>
                        <span class="team-name away">${pick.away_team}</span>
                    </div>
                    <div class="prob-row">
                        <div class="prob-labels">
                            <span class="lbl-home">1 &middot; ${hP}%</span>
                            <span class="lbl-draw">X &middot; ${dP}%</span>
                            <span class="lbl-away">2 &middot; ${aP}%</span>
                        </div>
                        <div class="prob-bar">
                            <div class="prob-seg home" style="width:${hP}%"></div>
                            <div class="prob-seg draw" style="width:${dP}%"></div>
                            <div class="prob-seg away" style="width:${aP}%"></div>
                        </div>
                    </div>
                    <div class="tip-row">
                        <div class="tip">
                            <span class="tip-badge ${badgeClass}">${formatMarket(pick)}</span>
                            <span class="tip-pick">${formatPickLabel(pick)}</span>
                        </div>
                        <div class="confidence">
                            <div class="conf-bar-bg">
                                <div class="conf-bar-fill ${isHigh ? '' : 'mid'}" style="width:${conf}%"></div>
                            </div>
                            <span>${conf}%</span>
                        </div>
                    </div>
                    ${pick.reasoning ? `<div class="reasoning">${pick.reasoning}</div>` : ''}
                </div>
            `;
        }

        async function fetchPicks(force = false) {
            const date = dateInput.value;
            if (!date) return;
            const grid = document.getElementById('picksGrid');
            const statusBar = document.getElementById('statusBar');
            statusBar.classList.remove('active');

            grid.innerHTML = '<div class="message"><div class="spinner"></div>Generating predictions...</div>';

            try {
                const url = force ? `/picks/date/${date}?force=true` : `/picks/date/${date}`;
                const res = await fetch(url);
                const data = await res.json();

                if (data.error) {
                    grid.innerHTML = `<div class="message error">${data.error}</div>`;
                    return;
                }

                if (!data.picks || data.picks.length === 0) {
                    grid.innerHTML = '<div class="message">No matches scheduled for this date.</div>';
                    return;
                }

                const displayDate = new Date(date + 'T12:00:00').toLocaleDateString('en-GB', {
                    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
                });
                document.getElementById('statusTitle').textContent = displayDate;
                document.getElementById('statusCount').textContent = data.count + ' tip' + (data.count !== 1 ? 's' : '');
                statusBar.classList.add('active');

                grid.innerHTML = '<div class="picks-list">' + data.picks.map(p => createPickCard(p)).join('') + '</div>';
            } catch (e) {
                grid.innerHTML = '<div class="message error">Could not connect to the server. Make sure it\'s running on port 8000.</div>';
            }
        }

        window.addEventListener('DOMContentLoaded', () => fetchPicks());
        dateInput.addEventListener('change', () => fetchPicks());
    </script>
</body>
</html>
